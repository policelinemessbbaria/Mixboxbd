function silentPointsRefresh() {
    if (!appData.user || !appData.user.userid) return;
    
    // ==========================================
    // FIX: NEW TAB DETECTION USING SESSIONSTORAGE
    // ==========================================
    let isNewTab = false;
    try {
        // চেক করুন এই ট্যাবে আগে পয়েন্ট সিঙ্ক হয়েছে কিনা
        if (!sessionStorage.getItem('ptsSyncedThisTab')) {
            isNewTab = true; // নতুন ট্যাব বা রিফ্রেশ করা হয়েছে
            // এই ট্যাবে একবার সিঙ্ক হয়েছে তা মার্ক করে রাখা হচ্ছে
            sessionStorage.setItem('ptsSyncedThisTab', 'true');
        }
    } catch (e) {}
    // ==========================================

    // ১. যদি নতুন ট্যাব হয়, তাহলে ২৪ ঘণ্টার থ্রটল ইগনোর করে সরাসরি নিচের সার্ভার কলে যাবে
    if (!isNewTab) {
        // ২. যদি একই ট্যাবে থাকে, তাহলে আগের মতোই ২৪ ঘণ্টা চেক করবে (localStorage দিয়ে)
        let lastSyncTime = 0;
        try {
            const saved = localStorage.getItem('lastPointsSyncTime');
            if (saved) lastSyncTime = parseInt(saved);
        } catch (e) {}
        
        const timeSinceLastSync = Date.now() - lastSyncTime;
        
        // থ্রটল টাইম: ২৪ ঘণ্টা = ৮৬৪০০০০০ মিলিসেকেন্ড
        const TWENTY_FOUR_HOURS_MS = 24 * 60 * 60 * 1000;
        
        // যদি ২৪ ঘণ্টা পার হয়নি এবং একই ট্যাবে আছে, তাহলে কল ব্লক করো
        if (lastSyncTime > 0 && timeSinceLastSync < TWENTY_FOUR_HOURS_MS) {
            return; 
        }
    }
    
    // ৩. সার্ভারে যাওয়ার মূল কোড (এখানে কোনো পরিবর্তন করতে হবে না)
    google.script.run
        .withSuccessHandler(res => {
            if (res.success) {
                const oldPoints = Number(appData.user.currentpoints) || 0;
                const newPoints = Number(res.currentpoints) || 0;
                const newExpiry = res.pointsexpirydate || '';
                
                // পয়েন্টস পরিবর্তন হলে আপডেট করবে
                if (oldPoints !== newPoints || appData.user.pointsexpirydate !== newExpiry) {
                    appData.user.currentpoints = newPoints;
                    appData.user.pointsexpirydate = newExpiry;
                    localStorage.setItem('user', JSON.stringify(appData.user));
                    
                    // UI আপডেট
                    const badge = document.getElementById('accountPtsBadge');
                    if (badge) badge.innerText = newPoints;
                    
                    const toggle = document.getElementById('ptsToggle');
                    const savingsLabel = document.getElementById('ptsSavingsLabel');
                    if (toggle && savingsLabel) {
                        if (newPoints > 0) {
                            toggle.disabled = false;
                            const ptsVal = newPoints * (Number(appData.settings.pointvalue) || 1);
                            const maxD = Number(appData.settings.maxpointdiscountlimit) || 500;
                            savingsLabel.innerText = `Save up to ৳${Math.min(ptsVal, maxD).toFixed(0)}`;
                        } else {
                            toggle.disabled = true;
                            toggle.checked = false;
                            savingsLabel.innerText = 'No Points';
                        }
                    }
                    
                    console.log(`Points updated: ${oldPoints} → ${newPoints}`);
                }
                
                // সময় সেভ করো (একই ট্যাবে পুনরায় কল রোধ করতে)
                try {
                    localStorage.setItem('lastPointsSyncTime', Date.now().toString());
                } catch (e) {}
            }
        })
        .withFailureHandler(err => {
            // এরর হলেও সময় সেভ করে দিবো
            try {
                localStorage.setItem('lastPointsSyncTime', Date.now().toString());
            } catch (e) {}
            console.warn("Points sync failed:", err);
        })
        .getLatestUserPoints(appData.user.userid);
}

                                text: `You requested an OTP recently. Please wait ${res.remainingSeconds} seconds before trying again.`,
                                confirmButtonColor: appData.settings.themecolor || '#2563eb'
                            });
                            document.getElementById('otpSection').classList.remove('hidden'); 
                            btn.textContent = t('reset_pass');
                            startForgotOtpTimer(res.remainingSeconds);
                            return;
                        }

                        if(res.success) { 
                            Swal.fire({ icon: 'success', title: t('otp_sent_msg'), text: t('check_inbox'), timer: 2000, showConfirmButton: false });
                            document.getElementById('otpSection').classList.remove('hidden'); 
                            btn.textContent = t('reset_pass');
                            startForgotOtpTimer();
                        }
                        else { 
                            Swal.fire('Error', res.error, 'error'); 
                        }
                    })
                    .withFailureHandler(handleAppError)
                    .sendOtp(email);
                    
            } else {
                if (!newPass || newPass.length < 6) return Swal.fire('Error', 'Valid password required', 'error');
                
                btn.textContent = "Reseting...";
                btn.disabled = true;

                google.script.run
                    .withSuccessHandler(res => { 
                        btn.disabled = false;
                        if(res.success) {
                            Swal.fire('Success', t('reset_success') + '! ' + t('please_login'), 'success').then(() => {
                                navigateTo('#login');
                            });
                        }
                        else Swal.fire('Error', res.error, 'error'); 
                    })
                    .withFailureHandler(handleAppError)
                    .resetPassword(email, otp, newPass);
            }
        }

        function startForgotOtpTimer(startSeconds) {
            let duration = startSeconds !== undefined ? startSeconds : (5 * 60);
            const timerDisplay = document.getElementById('forgotOtpTimerDisplay');
            const resendBtn = document.getElementById('forgotResendOtpBtn');
            
            forgotOtpResendEnabled = false;
            resendBtn.disabled = true;
            resendBtn.classList.add('text-gray-400', 'cursor-not-allowed');
            resendBtn.classList.remove('text-primary', 'cursor-pointer', 'underline');
            
            timerDisplay.classList.remove('hidden');
            resendBtn.classList.remove('hidden');

            clearInterval(forgotOtpTimerInterval);

            forgotOtpTimerInterval = setInterval(() => {
                const minutes = Math.floor(duration / 60);
                const seconds = duration % 60;
                const minStr = minutes < 10 ? '0' + minutes : minutes;
                const secStr = seconds < 10 ? '0' + seconds : seconds;
                
                timerDisplay.textContent = `${minStr}:${secStr}`;

                if (duration <= 0) {
                    clearInterval(forgotOtpTimerInterval);
                    timerDisplay.textContent = t('otp_expired');
                    forgotOtpResendEnabled = true;
                    resendBtn.disabled = false;
                    resendBtn.classList.remove('text-gray-400', 'cursor-not-allowed');
                    resendBtn.classList.add('text-primary', 'cursor-pointer', 'underline');
                    resendBtn.textContent = t('resend_otp');
                }
                duration--;
            }, 1000);
        }

        function handleResendForgotOtp() {
            if (!forgotOtpResendEnabled) return;
            const email = document.getElementById('forgotEmail').value.trim();
            if(!email) return Swal.fire('Error', 'Email missing', 'error');

            const resendBtn = document.getElementById('forgotResendOtpBtn');
            resendBtn.disabled = true;

            google.script.run
                .withSuccessHandler(res => {
                    if (res.remainingSeconds !== undefined) {
                        Swal.fire({
                            icon: 'info',
                            title: 'Please wait',
                            text: `Please wait ${res.remainingSeconds} seconds.`,
                            timer: 1500,
                            showConfirmButton: false
                        });
                        startForgotOtpTimer(res.remainingSeconds);
                    } else if(res.success) {
                        Swal.fire({ icon: 'success', title: 'OTP Sent', text: 'Check your inbox', timer: 1500, showConfirmButton: false });
                        startForgotOtpTimer();
                    } else {
                        Swal.fire('Error', res.error, 'error');
                        resendBtn.disabled = false;
                    }
                })
                .withFailureHandler(handleAppError)
                .sendOtp(email);
        }

function openProductInquiry() {
    const pName = document.getElementById('productName').textContent;
    
    // এটিই হলো বর্তমান বা ডিসকাউন্ট প্রাইস
    const pDiscountPriceText = document.getElementById('productPrice').textContent; 
    
    const pStatus = document.getElementById('stockStatus').innerText;
    const pImage = document.querySelector('#galleryContainer img')?.src || '';
    const selectedVariant = appData.currentSelectedVariant;

    // ==========================================
    // LOGIC: রেগুলার প্রাইস এবং সেভিংস বের করা
    // ==========================================
    const originalPriceEl = document.getElementById('originalPrice');
    let pRegularPriceText = pDiscountPriceText; // ডিফল্টভাবে একই থাকবে
    let hasDiscount = false;
    let pSaveAmount = '';

    // যদি রেগুলার প্রাইস এলিমেন্টটি দৃশ্যমান হয় (মানে ডিসকাউন্ট আছে)
    if (originalPriceEl && originalPriceEl.style.display !== 'none' && originalPriceEl.textContent.trim() !== '') {
        pRegularPriceText = originalPriceEl.textContent;
        hasDiscount = true;

        // সংখ্যা বের করে সেভিংস হিসাব করা
        const currentVal = parseFloat(pDiscountPriceText.replace(/[^0-9.]/g, '')) || 0;
        const originalVal = parseFloat(pRegularPriceText.replace(/[^0-9.]/g, '')) || 0;
        const saveVal = originalVal - currentVal;

        if (saveVal > 0) {
            pSaveAmount = saveVal + ' ৳';
        }
    }
    // ==========================================

    // ==========================================
    // LABELS SETTING (BANGLA & ENGLISH)
    // ==========================================
    let introText, nameText, regText, discText, saveText, statusText;

    if (appData.language === 'bn') {
        introText = 'আমি এই পণ্যটি কিনতে চাই / পণ্যটি সম্পর্কে জিজ্ঞাসা করতে চাই';

        saveText = 'আপনার সেভ হলো';
        statusText = 'স্ট্যাটাস';

        introText = 'I WANT TO BUY THIS PRODUCT / ASK ABOUT THIS';
        nameText = 'Product Name';
        regText = 'Regular Price';
        discText = 'Discount Price';
        saveText = 'You Save';
        statusText = 'Status';

    // ==========================================

    let msg = `*${introText}* 🛒\n`;
    msg += `━━━━━━━━━━━━━\n`; 
    msg += `*${nameText}* 👇\n${pName} ${selectedVariant ? `[${selectedVariant}]` : ''}\n`;
    msg += `━━━━━━━━━━━━━\n`;

    msg += `*${regText}:* ${pRegularPriceText}\n`;

         msg += `━━━━━━━━━━━━━\n`;

    if (number && number.trim() !== '') {
        const cleanNumber = number.replace(/[^0-9]/g, '');

        function applyFilters() {
            const category = document.getElementById('filterCategory').value;
            const subCategory = document.getElementById('filterSubCategory').value;
            const priceRange = document.getElementById('filterPrice').value;
            const sortOrder = document.getElementById('filterSort').value;
            const container = document.getElementById('homeAllProductsList');
            const titleRow = document.getElementById('homeAllProductsTitleRow');
            const titleH1 = titleRow ? titleRow.querySelector('h1') : null;
            const pagination = document.getElementById('homePaginationControls');

            if (!container) {
                toggleFilter();
                navigateTo('#home');
                return;
            }

            let filtered = appData.products;

            // ==========================================
            // UPDATED: FILTERING LOGIC
            // ==========================================
            if (category !== 'all') {
                if (subCategory && subCategory !== 'all') {
                    // Filter by EXACT Sub-Category String
                    filtered = filtered.filter(p => p.category === subCategory);
                } else {
                    // Filter by Main Category (StartsWith)
                    filtered = filtered.filter(p => p.category.startsWith(category));
                }
            }

            if (priceRange !== 'all') {
                const [minStr, maxStr] = priceRange.split('-');
                const min = parseInt(minStr);
                
                if (priceRange === '2001-above') {
                    filtered = filtered.filter(p => (p.discountprice || p.price) > 2000);
                } else {
                    const max = parseInt(maxStr);
                    filtered = filtered.filter(p => {
                        const price = p.discountprice || p.price;
                        return price >= min && price <= max;
                    });
                }
            }

            if (sortOrder === 'low-high') {
                filtered.sort((a, b) => (a.discountprice || a.price) - (b.discountprice || b.price));
            } else if (sortOrder === 'high-low') {
                filtered.sort((a, b) => (b.discountprice || a.price) - (a.discountprice || b.price));
            }

            document.getElementById('homeHeroSection').style.display = 'none';
            document.getElementById('featuredProducts').style.display = 'none';
            titleRow.classList.remove('hidden');

            if (filtered.length === 0) {
                if(container) {

        let popupState = {
            items: [],

        function initPopupSystem() {
            if (sessionStorage.getItem('popupClosed')) {
                return;
            }

            popupState.items = appData.popups.filter(p => p.status === 'active');

            if (popupState.items.length === 0) return;

            renderPopupSlides();

            const overlay = document.getElementById('popup-overlay');
            
            overlay.classList.remove('hidden');
            void overlay.offsetWidth;
            overlay.classList.remove('opacity-0');

            if (popupState.items.length > 1) {
                popupState.intervalId = setInterval(nextPopupSlide, popupState.autoSlideDelay);
            } else {
                document.getElementById('btn-prev').style.display = 'none';
                document.getElementById('btn-next').style.display = 'none';
                document.getElementById('popup-dots').style.display = 'none';
            }
        }

        function renderPopupSlides() {
            const slider = document.getElementById('popup-slider');
            const dotsContainer = document.getElementById('popup-dots');
            
            slider.innerHTML = '';
            dotsContainer.innerHTML = '';

            popupState.items.forEach((popup, index) => {
                const slide = document.createElement('div');
                slide.className = 'w-full flex-shrink-0 relative cursor-pointer';
                slide.onclick = () => handlePopupAction(popup);

                if (popup.popupimage) {
                    const img = document.createElement('img');
                    img.src = popup.popupimage;
                    img.className = 'w-full h-auto object-contain'; 
                    img.alt = 'Popup Offer';
                    slide.appendChild(img);

                slider.appendChild(slide);

                const dot = document.createElement('button');
                dot.className = `popup-dot w-2 h-2 rounded-full ${index === 0 ? 'bg-[var(--primary-color)]' : 'bg-white/50'}`;
                dot.onclick = (e) => {
                    e.stopPropagation();
                    goToPopupSlide(index);
                };
                dotsContainer.appendChild(dot);
            });
        }

        function updatePopupSlider() {
            const slider = document.getElementById('popup-slider');
            slider.style.transform = `translateX(-${popupState.currentIndex * 100}%)`;

            const dots = document.querySelectorAll('.popup-dot');
            dots.forEach((dot, index) => {
                dot.className = `popup-dot w-2 h-2 rounded-full transition-all duration-300 ${index === popupState.currentIndex ? 'bg-[var(--primary-color)] scale-125' : 'bg-white/50'}`;
            });
        }

        function nextPopupSlide() {
            popupState.currentIndex = (popupState.currentIndex + 1) % popupState.items.length;
            updatePopupSlider();
        }

        function prevPopupSlide() {
            popupState.currentIndex = (popupState.currentIndex - 1 + popupState.items.length) % popupState.items.length;
            updatePopupSlider();
        }

        function goToPopupSlide(index) {
            popupState.currentIndex = index;
            updatePopupSlider();
            resetPopupAutoSlide();
        }

        function resetPopupAutoSlide() {
            clearInterval(popupState.intervalId);
            if (popupState.items.length > 1) {
                popupState.intervalId = setInterval(nextPopupSlide, popupState.autoSlideDelay);
            }
        }

        function closePopup() {
            const overlay = document.getElementById('popup-overlay');
            overlay.classList.add('opacity-0');
            setTimeout(() => {
                overlay.classList.add('hidden');

                targetUrl = `#product?id=${popup.targetvalue}`;
            } else if (popup.targettype === 'category') {
                targetUrl = `#category?name=${encodeURIComponent(popup.targetvalue)}`;
            } else if (popup.targettype === 'url') {
                window.open(popup.targetvalue, '_blank');
                closePopup();

                closePopup();

            if (targetUrl) {

// ==========================================
// MIX BOX - ULTIMATE BACK BUTTON HANDLER (UNIVERSAL SCROLL FIX)
// ==========================================

let backPressCount = 0;
let backPressTimeout;

// ১. স্মার্ট হিস্ট্রি ট্র্যাপ
function maintainHistoryTrap() {
    if (!window.history.state || window.history.state.appState !== 'trap') {
        window.history.replaceState({ appState: 'base' }, '', window.location.href);
        window.history.pushState({ appState: 'trap' }, '', window.location.href);
    }
}

// ২. ডিপ লিংক এবং রুট গার্ড
window.addEventListener('load', () => {
    const currentHash = window.location.hash;
    if (currentHash && currentHash !== '#home') {
        const currentUrl = window.location.href;
        window.history.replaceState({ appState: 'base' }, '', '#home');
        window.history.pushState({ appState: 'trap' }, '', '#home');
        window.history.pushState({ appState: 'base' }, '', currentUrl);
        window.history.pushState({ appState: 'trap' }, '', currentUrl);
    } else {
        maintainHistoryTrap();
    }
});

window.addEventListener('hashchange', maintainHistoryTrap);

// ৩. মডাল চেক
function isAnyModalOpen() {
    const isSwalOpen = typeof Swal !== 'undefined' && Swal.isVisible();
    const modalIds = ['filterModal', 'cartSidebar', 'popup-overlay', 'searchBar', 'refundModal', 'rewardModal', 'passwordModal'];
    const isOtherModalOpen = modalIds.some(id => {
        const el = document.getElementById(id);
        if (!el) return false;
        return !el.classList.contains('hidden') && !el.classList.contains('translate-x-full');
    });
    return isSwalOpen || isOtherModalOpen;
}

// ৪. মডাল বন্ধ করা
function closeAllModals() {
    if (typeof Swal !== 'undefined' && Swal.isVisible()) Swal.close();
    const modals = [
        { id: 'filterModal', closeFunc: typeof toggleFilter === 'function' ? toggleFilter : null },
        { id: 'cartSidebar', closeFunc: typeof hideCart === 'function' ? hideCart : null },
        { id: 'popup-overlay', closeFunc: typeof closePopup === 'function' ? closePopup : null },
        { id: 'searchBar', closeFunc: typeof toggleSearch === 'function' ? toggleSearch : null },
        { id: 'refundModal', closeFunc: null },
        { id: 'rewardModal', closeFunc: null },
        { id: 'passwordModal', closeFunc: null }
    ];
    modals.forEach(modal => {
        const el = document.getElementById(modal.id);
        if (el && (!el.classList.contains('hidden') || el.classList.contains('translate-x-0'))) {
            if (modal.closeFunc) {
                modal.closeFunc();
            } else {
                el.classList.add('hidden');
            }
        }
    });
}

// ৫. মূল নেভিগেশন ও এক্সিট কন্ট্রোল (UNIVERSAL FIX FOR ALL PAGES)
window.onpopstate = function(event) {
    if (event.state && event.state.appState === 'base') {
        
        // ক) মডাল প্রায়োরিটি
        if (isAnyModalOpen()) {
            closeAllModals();
            window.history.pushState({ appState: 'trap' }, '', window.location.href);

            // ==========================================
            // FIX: UNIVERSAL SCROLL RESTORATION
            // ==========================================
            // এখান থেকে if (hash === '#home') কন্ডিশনটি সরিয়ে দেওয়া হয়েছে।
            // appData.homeScrollPos গ্লোবালভাবে আপডেট হয়, তাই এটি প্রোডাক্ট পেজের
            // সঠিক পজিশনও মনে রাখে। এখন যেকোনো পেজেই মডাল বন্ধ করলে
            // স্ক্রল জাম্প করবে না।
            const targetY = appData.homeScrollPos || 0;
            window.requestAnimationFrame(() => {
                window.scrollTo(0, targetY);
            });
            // ==========================================
            return;
        }

        const currentHash = window.location.hash;

        // খ) হোম পেজ এক্সিট লজিক (এই অংশটুকু হোম পেজের জন্য আলাদা থাকছে)
        if (currentHash === '' || currentHash === '#home') {
            
            if (appData.lastRoute && appData.lastRoute !== '#home') {
                window.location.reload();
                return;
            }

            if (backPressCount === 1) {
                window.history.go(-2); 
                return;
            }

            // স্ক্রল পজিশন লোড করা (SessionStorage Priority)
            let savedScrollY = appData.homeScrollPos || 0;
            try {
                const stored = sessionStorage.getItem('homeScrollPos');
                if (stored) savedScrollY = parseInt(stored);
            } catch(e){}

            backPressCount = 1;
            window.history.pushState({ appState: 'trap' }, '', window.location.href); 

            // এখানে ডাবল চেক দিয়ে স্ক্রল করা হচ্ছে
            window.requestAnimationFrame(() => {
                window.scrollTo(0, savedScrollY);
            });

            if (typeof Swal !== 'undefined') {
                const siteLogo = (typeof appData !== 'undefined' && appData.settings && appData.settings.sitelogo) 
                                ? appData.settings.sitelogo 
                                : 'https://via.placeholder.com/20?text=Logo';

                Swal.fire({
                    html: `
                        <div style="display: inline-flex; align-items: center; gap: 8px; background: rgba(0, 0, 0, 0.75); color: white; padding: 10px 20px; border-radius: 50px; font-family: 'Poppins', sans-serif; font-size: 14px; white-space: nowrap; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: max-content;">
                            <img src="${siteLogo}" style="height: 20px; width: auto; object-fit: contain; display: block;">
                            <span>${t('Press back again to exit')}</span>
                        </div>
                    `,
                    toast: true,
                    position: 'bottom',
                    showConfirmButton: false,
                    timer: 2000,
                    background: 'transparent',
                    color: '#ffffff',
                    customClass: {
                        popup: 'swal2-exit-custom' 
                    },
                    showClass: { popup: 'animate__animated animate__fadeInUp animate__faster' },
                    hideClass: { popup: 'animate__animated animate__fadeOutDown animate__faster' },
                    didOpen: (popup) => {
                        popup.style.position = 'fixed';
                        popup.style.bottom = '75px';
                        popup.style.left = '50%';
                        popup.style.transform = 'translateX(-50%)';
                        popup.style.margin = '0';
                        popup.style.width = 'max-content'; 
                        popup.style.padding = '0';
                        popup.style.display = 'block';
                    }
                });
            }

            clearTimeout(backPressTimeout);
            backPressTimeout = setTimeout(() => { backPressCount = 0; }, 2000);

        } else {
            // গ) রুট গার্ড
            if (window.history.length <= 2) {
                window.location.hash = '#home';
            } else {
                window.history.back();
            }
        }
    } else {
        maintainHistoryTrap();
    }
};
// ==========================================
// ULTIMATE SCROLL UNFREEZE FIX (Touch Swipe + Auto Detect + Safety Net)
// ==========================================

function forceUnfreezeScroll() {
    // ১. বডি চেক করা
    const body = document.body;
    const app = document.getElementById('app');
    
    // বডির স্টাইল চেক করা (Inline এবং Computed দুটোই)
    const isBodyLocked = body.style.overflow === 'hidden' || window.getComputedStyle(body).overflow === 'hidden';
    
    // ২. সুইটঅ্যালার্ট (SweetAlert) চেক করা
    // যদি Swal লাইব্রেরি লোড না হয়, তবে এরর আটকাতে typeof চেক করা হয়েছে
    const isSwalOpen = typeof Swal !== 'undefined' && Swal.isVisible();

    // ৩. কাস্টম মডাল চেক করা (যেগুলো স্ক্রল ব্লক করে)
    const modalIds = ['cartOverlay', 'popup-overlay', 'filterModal', 'searchBar', 'skeletonLoader'];
    let isAnyCustomModalOpen = false;
    
    modalIds.forEach(id => {
        const el = document.getElementById(id);
        if (el) {
            // Computed Style চেক করা (শুধুমাত্র Class নয়) -> আরও নির্ভুল রেজাল্টের জন্য
            const style = window.getComputedStyle(el);
            const isDisplayNone = style.display === 'none';
            const isVisibilityHidden = style.visibility === 'hidden';
            
            // এলিমেন্টটি যদি ভিজিবল থাকে এবং hidden ক্লাস না থাকে
            if (!isDisplayNone && !isVisibilityHidden && !el.classList.contains('hidden')) {
                // কার্ট সাইডবারের অবস্থান চেক করা (translateX)
                if (id === 'cartSidebar' && el.classList.contains('translate-x-full')) {
                    // কার্ট ডানদিকে চলে গেছে (বন্ধ), তাই এটি ওপেন নয়
                } else {
                    isAnyCustomModalOpen = true;
                }
            }
        }
    });

    // ==========================================
    // SAFETY NET: "Never Freeze" লজিক
    // ==========================================
    // যদি মডাল ওপেন না থাকে কিন্তু body-তে SweetAlert-এর ক্লাস থাকে, তবে সরিয়ে দিন
    if (!isSwalOpen && body.classList.contains('swal2-shown')) {
        body.classList.remove('swal2-shown', 'swal2-height-auto', 'swal2-iosfix');
    }
    // ==========================================

    // ৪. লজিক: যদি কোনো মডাল ওপেন না থাকে কিন্তু স্ক্রল লক থাকে, তবে ফোর্স আনলক করুন
    if (!isSwalOpen && !isAnyCustomModalOpen) {
        if (isBodyLocked) {
            // স্ক্রল চালু করুন
            body.style.overflow = 'auto';
            body.style.position = 'relative';
            
            // অতিরিক্ত সুরক্ষা: অ্যাপ কন্টেইনারের স্ক্রলও চালু করুন
            if(app) {
                app.style.overflow = 'auto';
                app.style.position = 'relative';
            }
            
            // ডিবাগিং-এর জন্য (প্রয়োজনে আন-কমেন্ট করুন)
            // console.log('Scroll Unfrozen Automatically');
        }
    }
}

// ৫. ইভেন্ট লিসেনার যোগ করা
// 'touchstart' ইভেন্টটি মোবাইলে সোয়াইপ করার শুরুতেই ট্রিগার হবে
// passive: true ব্যবহার করা হয়েছে যাতে স্ক্রলিং পারফরম্যান্সে কোনো সমস্যা না হয়
document.addEventListener('touchstart', forceUnfreezeScroll, { passive: true });

// ডেস্কটপে মাউস স্ক্রল বা ক্লিক করলেও যেন কাজ করে
document.addEventListener('mousedown', forceUnfreezeScroll, { passive: true });

// যদি কেউ স্ক্রল করার চেষ্টা করে এবং আটকে যায়, তখনও চেক করা
window.addEventListener('scroll', () => {
    if (document.body.style.overflow === 'hidden') {
        forceUnfreezeScroll();
    }
}, { passive: true });

// হেল্পার ফাংশন (IP & Cookies)
function getFbcCookie() {
    const match = document.cookie.match(/(^|;) *fbc=([^;]*)/);
    return match ? match[2] : null;
}
function getFbpCookie() {
    const match = document.cookie.match(/(^|;) *fbp=([^;]*)/);
    return match ? match[2] : null;
}
function generateEventId() {
    return 'evt_' + Date.now() + '_' + Math.floor(Math.random() * 10000);
}

async function trackCAPI(eventName, customData, eventId) {
    
    // ==========================================
    // টায়ার ১: LOW PRIORITY (শুধু ব্রাউজার পিক্সেলে থাকবে)
    // কারণ: পরিমাণ অনেক বেশি (৩০০০+), রিটার্গেটিং ভ্যালু কম
    // ==========================================
    if (eventName === 'ViewContent' || eventName === 'PageView') {
        console.log("%c[CAPI Skipped] Low priority event.", "color: gray;", eventName);
        return; 
    }

    // ==========================================
    // টায়ার ২: MEDIUM & HIGH PRIORITY (সবসময় সার্ভারে যাবে)
    // কারণ: AddToCart ও Purchase এর পরিমাণ কম (১০০-২০০), রিটার্গেটিং ভ্যালু অনেক বেশি
    // অ্যাডব্লকার থাকলেও এরা সার্ভারে যাবে কারণ Fetch API ব্লক করে না
    // ==========================================
    // (আমরা আর fbc কুকি চেক করছি না, সরাসরি পাঠিয়ে দিচ্ছি)
    
    // ==========================================
    // IP এবং পেলোড তৈরি
    // ==========================================
    let clientIp = null;
    try {
        const ipResponse = await fetch('https://api.ipify.org?format=json');
        const ipData = await ipResponse.json();
        if (ipData.ip) clientIp = ipData.ip;
    } catch (e) { 
        console.warn("IP fetch failed"); 
    }

    const clientUserAgent = navigator.userAgent;
    const fbc = getFbcCookie(); 
    const fbp = getFbpCookie();
    
    const payload = {
        functionName: 'trackFacebookServerEvent',
        arguments: [
            eventName,
            customData,
            appData.user?.email || null,
            appData.user?.mobilenumber || null,
            clientIp,
            clientUserAgent,
            fbc, 
            fbp,
            eventId, 
            null
        ]
    };

    try {
        await fetch(GAS_WEB_APP_URL, {
            method: 'POST',
            mode: 'cors',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload)
        });
        console.log("%c[CAPI Fired]", "color: green; font-weight: bold;", eventName);
    } catch (err) {
        console.error("CAPI Fetch Error:", err);
    }
}
    </script>
