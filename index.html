<script>
  if ('serviceWorker' in navigator) {
    let refreshing = false; // ইনফিনিট লুপ রোধ করার জন্য
    
    // যখন ব্যাকগ্রাউন্ডে নতুন SW আপডেট হবে, তখন এই ইভেন্ট ফায়ার হবে
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (refreshing) return; 
      refreshing = true;
      console.log("New Service Worker detected. Reloading...");
      window.location.reload(); // ইউজারের অজান্তেই পেজ রিফ্রেশ হয়ে যাবে
    });

    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('Service Worker Registered!', reg))
        .catch(err => console.log('Service Worker Error', err));
    });
  }
</script>

// ১. ভেরিয়েবল ডিক্লেয়ার করা হচ্ছে
let trackAttempts = 0;
let trackBlockUntil = 0;

// ২. পেজ লোড হলেই localStorage থেকে ডাটা আনার চেষ্টা
try {
    const savedBlockTime = localStorage.getItem('trackBlockUntil');
    if (savedBlockTime) {
        const parsedTime = parseInt(savedBlockTime);
        // যদি সেভ করা সময় বর্তমান সময়ের চেয়ে বেশি হয়, তবে তা লোড করা হবে
        if (!isNaN(parsedTime) && parsedTime > Date.now()) {
            trackBlockUntil = parsedTime;
            trackAttempts = 3; // ব্লক এক্টিভ থাকলে অ্যাটেম্পট ম্যাক্সিমাম সেট করুন
            console.log("Rate Limit Active: Block loaded from LocalStorage");
        } else {
            // সময় শেষ হয়ে গেছে, স্টোরেজ পরিষ্কার করুন
            localStorage.removeItem('trackBlockUntil');
        }
    }
} catch (e) {
    console.warn("LocalStorage access denied or disabled:", e);
}

// সেকশন ২: হেল্পার ফাংশন (কাউন্টার বাড়ানো)
// ============================================================
function incrementTrackAttempt() {
    trackAttempts++;
    
    const MAX_ATTEMPTS = 3;
    const BLOCK_DURATION_MS = 5 * 60 * 1000; // ৫ মিনিট

    if (trackAttempts >= MAX_ATTEMPTS) {
        trackBlockUntil = Date.now() + BLOCK_DURATION_MS;
        
        // localStorage এ সেভ করা হচ্ছে
        try {
            localStorage.setItem('trackBlockUntil', trackBlockUntil);
            console.log("User Blocked. Time saved to LocalStorage.");
        } catch (e) {
            console.warn("Failed to save to LocalStorage", e);
        }
        
        return true; // true মানে ব্লক হয়ে গেছে
    }
    
    return false; // false মানে এখনও ব্লক হয়নি
}

// INSTANT FIX: মুহূর্তেই স্ক্রল ঠিক করার ফাংশন
// ==========================================
function instantScrollFix() {
    // ১. বডির স্ক্রল জোর করে চালু করা
    document.body.style.overflow = 'auto';
    document.body.style.position = 'relative';

    // ২. সম্ভাব্য সব কাঁচ (Overlay) এর লিস্ট
    const blockers = ['cartOverlay', 'popup-overlay', 'filterModal', 'searchBar'];

    // ৩. লুপ চালিয়ে সবগুলোকে লুকিয়ে ফেলা
    blockers.forEach(id => {
        const el = document.getElementById(id);
        if (el && !el.classList.contains('hidden')) {
            el.classList.add('hidden'); // লুকাও
            console.log('Fixed Ghost Overlay:', id); // ডিবাগিং-এর জন্য
        }
    });
    
    // ৪. কার্ট সাইডবার যদি বের হয়ে থাকে, সেটাও ভেতরে ঢোকাও
    const sidebar = document.getElementById('cartSidebar');

function safeJsonParse(jsonString) {
    if (!jsonString || typeof jsonString !== 'string') {
        return [];
    }

    try {
        let cleanStr = jsonString.replace(/[\u0000-\u001F\u007F]/g, ''); 
        return JSON.parse(cleanStr);
    } catch (e) {
        console.error("JSON Parse Error (Handled):", e);
        console.error("Problematic String:", jsonString);
        return [];
    }

function setupEventListeners() {
    window.addEventListener('hashchange', () => loadRoute(window.location.hash));
    const searchInput = document.getElementById('searchInput');
    
    if(searchInput) {
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.trim();
            const keyPressed = e.key;

            // Space বা Enter চাপলে সাথে সাথে সার্চ হবে
            if (keyPressed === ' ' || keyPressed === 'Enter') {
                clearTimeout(searchTimeout);
                searchProducts(query);
                return;
            }

            // কিছু মুছে ফেললে সাথে সাথে রিসেট হবে
            if (query.length === 0) {
                clearTimeout(searchTimeout);
                searchProducts(query);
                return;
            }

            // সাধারণ টাইপিংয়ের জন্য ৩০০ মিলিসেকেন্ড অপেক্ষা করুন
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                searchProducts(query);
            }, 300);
        }); 
        
        // Enter চাপলে ফর্ম সাবমিট বন্ধ করতে
        searchInput.addEventListener('keydown', (e) => {
            if(e.key === 'Enter') {
                e.preventDefault();
            }
        });
    }
}

function navigateTo(route) {
    // ==========================================
    // ১. স্টোরেজ সেভ করার আগেই চেক করা (পুরাতন লজিক ঠিক আছে)
    // ==========================================
    if (route === '#home' && window.location.hash !== '#home') {
        appData.forceHomeReset = true;
        try {
            sessionStorage.setItem('homePageNum', 1);
        } catch (e) {
            console.warn("SessionStorage access failed:", e);
        }
    }
    
    // ==========================================
    // ২. নেভিগেশন রিলোড লজিক (এখানেই ফিক্স করা হয়েছে)
    // ==========================================
    const currentHash = window.location.hash || '#home';
    const targetHash = route || '#home';

    if (currentHash === targetHash) {
        // Trigger Flash Effect
        const app = document.getElementById('app');
        if(app) {
            app.classList.remove('flash-active');
            void app.offsetWidth; // trigger reflow
            app.classList.add('flash-active');
        }
        
        // ==========================================
        // ফিক্স: যদি ইউজার আগে থেকেই Home-এ থাকে (যেমন পেজ ২ বা ৩)
        // এবং আবার Home বাটনে ক্লিক করে, তবে পেজ ১-এ নিয়ে আসুন।
        // ==========================================
        if (targetHash === '#home') {
            appData.allProductsCurrentPage = 1; // পেজ নাম্বার ১ সেট করা
            appData.forceHomeReset = true;      // রিসেট ফ্ল্যাগ অন করা
            try {
                sessionStorage.setItem('homePageNum', 1); // স্টোরেজ রিসেট করা
            } catch (e) {
                console.warn("SessionStorage write failed:", e);
            }
            window.scrollTo(0, 0); // স্ক্রল উপরে নিয়ে আসা
        }
        // ==========================================

        // রুট আবার লোড করা
        loadRoute(targetHash);
        return; // এখানেই স্টপ করবে, হ্যাশ চেঞ্জ করবে না
    }
    // ==========================================

    // নরমাল নেভিগেশন (অন্য পেজে যাওয়া)
    window.location.hash = route;
}

function loadRoute(hash) {
    // ==========================================
    // FIX: SMART SCROLL RESET (SKIP FOR CHECKOUT RETURN)
    // ==========================================
    let skipScrollToTop = false;
    if (hash.includes('checkout')) {
        try {
            const savedScroll = sessionStorage.getItem('scrollPos_' + hash);
            if (savedScroll && parseInt(savedScroll, 10) > 0) {
                skipScrollToTop = true;
            }
        } catch(e) {}
    }
    
    if (!skipScrollToTop) {
        window.scrollTo(0, 0);
    }
    // ==========================================
    instantScrollFix();
            const [route, queryString] = hash.replace('#', '').split('?');
            const params = new URLSearchParams(queryString);
            const content = document.getElementById('content');
            
            // ==========================================================
            // FIX FOR SLOW NAVIGATION: UPDATE UI FIRST
            // ==========================================================
            // বাটনের কালার পরিবর্তন দ্রুত দেখানোর জন্য 
            // DOM ক্লিয়ার আগেই updateNavActive কল করা হচ্ছে।
            // এতে ব্যবহারকারী তাৎক্ষণেই ফিডব্যাক পাবেন।
            updateNavActive(route);
            // ==========================================================

            content.innerHTML = '';
            stopSlider();

            // ==========================================
            // OPTIMIZED: ONLY CHECK SESSIONSTORAGE IF HOME
            // ==========================================
            // স্পিড বাড়াতে আমরা শুধুমাত্র হোম পেজে লোড করার সময় SessionStorage চেক করব।
            if (route === 'home' || route === '') {
                try {
                    const storedPage = sessionStorage.getItem('homePageNum');
                    if (storedPage && parseInt(storedPage) > 1) {
                        appData.allProductsCurrentPage = parseInt(storedPage);
                    }
                } catch (e) {
                    console.warn("SessionStorage read failed:", e);
                }
                
                // Check Force Reset
                if (appData.forceHomeReset) {
                    appData.allProductsCurrentPage = 1;
                    appData.forceHomeReset = false;
                    try {
                        sessionStorage.setItem('homePageNum', 1);
                    } catch (e) {
                        console.warn("SessionStorage write failed:", e);
                    }
                }
            }
            // ==========================================
            
            appData.currentSelectedVariant = null; // Reset variant selection on nav

            switch (route) {
                case '': loadHomePage(); break;
                case 'home': loadHomePage(); break;
                case 'categories': loadCategoriesPage(); break;
                case 'category': loadCategoryProducts(params.get('name')); break;
                case 'product': loadProductDetails(params.get('id')); break;
                case 'cart': loadCartPage(); break;
                case 'checkout': loadCheckoutPage(); break;
                case 'account': loadAccountPage(); break;
                case 'my-orders': loadMyOrdersPage(); break; 
                case 'login': loadTemplate('loginTemplate'); break;
                case 'register': loadTemplate('registerTemplate'); break;
                case 'forgot-password': loadTemplate('forgotPasswordTemplate'); break;
                case 'messages': loadMessagesPage(); break;
                default: loadHomePage();
            }
            
            // ==========================================================
            // REMOVED: Redundant updateUIText call from end of loadRoute
            // This was causing slowness on Home page because updateUIText
            // iterates over DOM elements. Specific page loaders handle it.
            // ==========================================================
        }

        function updateNavActive(route) {
            document.querySelectorAll('nav button').forEach(btn => {
                btn.classList.remove('nav-active', 'text-primary');
                btn.classList.add('text-gray-500');
            });
            let activeId = 'home';
            if (route === 'categories' || route === 'category') activeId = 'categories';

            if (route === 'cart' || route === 'checkout') activeId = 'cart';

function loadMyOrdersPage() {
    const content = document.getElementById('content');
    if(content) {
        content.innerHTML = ''; 
    }
    
    // ১. CHECK: USER LOGGED IN? (Frontend Check)
    if (!appData.user || !appData.user.userid) {
        handleSessionError();
        return;
    }

    // ২. টেমপ্লেট লোড এবং UI সেটআপ
    loadTemplate('myOrdersTemplate');
    currentOrderFilter = 'All';
    
    try {
        updateFilterTabsUI();
    } catch(e) {
        console.error("Tab UI Error:", e);
    }

    const loadingEl = document.getElementById('myOrdersLoading');
    const errorEl = document.getElementById('myOrdersError');
    const emptyEl = document.getElementById('myOrdersEmpty');
    const listEl = document.getElementById('myOrdersList');
    const errorText = document.getElementById('myOrdersErrorText');

    // লোডিং স্টেটাস অন
    if(loadingEl) loadingEl.classList.remove('hidden');
    if(errorEl) errorEl.classList.add('hidden');
    if(emptyEl) emptyEl.classList.add('hidden');
    listEl.innerHTML = '';

    // ৩. ক্যাশ চেক (সাধারণ প্রক্রিয়া)
    if (allOrdersCache && allOrdersCache.length > 0) {
        console.log("Loading Orders from Cache...");
        setTimeout(() => {
            loadingEl.classList.add('hidden');
            renderFilteredOrders();
        }, 400);
        return;
    }

    // ৪. সার্ভার কল (FETCH)
    google.script.run
        .withSuccessHandler(res => {
            loadingEl.classList.add('hidden');
            console.log("My Orders Response:", res);
            
            // SUCCESS HANDLER ERROR CHECK
            if (!res.success) {
                 const errorMsg = (res.error || '').toLowerCase();
                 console.log("Error detected in Success Handler:", errorMsg);
                 
                 // এরর মেসেজে সেশন বা টোকেন রিলেটেড শব্দ আছে কিনা?
                 if (errorMsg.includes('session') || errorMsg.includes('token') || errorMsg.includes('invalid') || errorMsg.includes('expired') || errorMsg.includes('unauthorized')) {
                     handleSessionError();
                     return;
                 }
                 // অন্যান্য এরর হলে দেখান
                 errorEl.classList.remove('hidden');
                 errorText.innerText = res.error || t('error_loading');
                 return;
            }

            if (res.success) {
                allOrdersCache = res.orders || [];
                renderFilteredOrders();
            }
        })
        // ==========================================
        // IMPORTANT: FAILURE HANDLER (Exception Case)
        // ==========================================
        .withFailureHandler(err => {
            loadingEl.classList.add('hidden');
            console.error("Orders fetch failed (Server Exception):", err);
            
            // এরর স্ট্রিং কনভার্ট করে চেক করা
            const errStr = String(err).toLowerCase();
            
            // যদি সার্ভার সাইড এররেও 'Session', 'Unauthorized' ইত্যাদি থাকে
            if (errStr.includes('session') || errStr.includes('token') || errStr.includes('unauthorized') || errStr.includes('expired') || errStr.includes('access')) {
                handleSessionError();
            } else {
                // সাধারণ এরর দেখান
                errorEl.classList.remove('hidden');
                errorText.innerText = err.message || t('error_loading');
            }
        })
        // ==========================================
        .getUserOrders(appData.user.userid, appData.sessionToken, appData.user.email);
}

        function filterOrders(status) {
            currentOrderFilter = status;
            updateFilterTabsUI();
            renderFilteredOrders();
        }

        function updateFilterTabsUI() {
            const tabs = ['All', 'Processing', 'Shipped', 'Delivered'];
            tabs.forEach(tabName => {
                const btn = document.getElementById(`tab-${tabName}`);
                if(btn) {
                    if (tabName === currentOrderFilter) {
                        btn.className = 'flex-1 min-w-[80px] py-2 text-xs font-bold rounded-full bg-primary text-white shadow-md transition-all';
                    } else {
                        btn.className = 'flex-1 min-w-[80px] py-2 text-xs font-bold rounded-full bg-gray-100 text-gray-600 hover:bg-gray-200 transition-all';
                    }
                    
                    // Translation Logic with Fallback
                    try {
                        const key = tabName === 'All' ? 'all' : 'status_' + tabName.toLowerCase();
                        btn.innerText = t(key);
                    } catch (e) {
                        btn.innerText = tabName; // Fallback to English if translation fails
                    }
                }
            });
        }

        function renderFilteredOrders() {
            const listEl = document.getElementById('myOrdersList');
            const emptyEl = document.getElementById('myOrdersEmpty');
            
            const displayOrders = allOrdersCache.filter(order => {
                if (currentOrderFilter === 'All') return true;
                return order.status === currentOrderFilter;
            });

            if (displayOrders.length === 0) {
                listEl.innerHTML = '';

// HELPER: SIMPLE HASH FUNCTION FOR CACHE KEY

function simpleHash(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
        const char = str.charCodeAt(i);
        hash = ((hash << 5) - hash) + char;
        hash = hash & hash; // Convert to 32bit integer
    }
    return hash;
}

                const minStr = minutes < 10 ? '0' + minutes : minutes;
                const secStr = seconds < 10 ? '0' + seconds : seconds;
                
                timerDisplay.textContent = `${minStr}:${secStr}`;

// UPDATED: SMART RATE LIMITING (CACHE FIRST)

function handleTrackOrder() {
    Swal.fire({
        title: t('track_order'),
        input: 'text',
        inputPlaceholder: t('enter_order_id'),
        inputAttributes: {
            autocapitalize: 'off',
            autocorrect: 'off',
            maxlength: 18
        },
        showCancelButton: true,
        confirmButtonText: t('track_now'),
        confirmButtonColor: appData.settings.themecolor || '#2563eb',
        cancelButtonText: 'Cancel',
        showLoaderOnConfirm: true,
        preConfirm: (orderId) => {
            const now = Date.now();

            // ১. খালি ইনপুট চেক
            if (!orderId || orderId.trim() === '') {
                incrementTrackAttempt();
                Swal.showValidationMessage(t('fill_all'));
                return false;
            }

            // ২. ফরম্যাট ভ্যালিডেশন
            const id = orderId.trim().toUpperCase();
            const orderRegex = /^ORD\d{15}$/;

            if (!orderRegex.test(id)) {
                const isBlocked = incrementTrackAttempt();
                if (isBlocked) {
                    return false; 
                } else {
                    let errorMsg = "";
                    if (appData.language === 'bn') {
                        errorMsg = "ভুল অর্ডার আইডি। এটি 'ORD' দিয়ে শুরু হতে হবে এবং পরে ১৫টি সংখ্যা থাকতে হবে";
                    } else {
                        errorMsg = "Invalid Order ID. Must start with 'ORD' followed by 15 digits";
                    }
                    Swal.showValidationMessage(errorMsg);
                    return false;
                }
            }

            // ৩. CACHE CHECK (প্রথমে ক্যাশ)
            const cachedData = trackCache[id];
            if (cachedData && (now - cachedData.time < 60000)) {
                // ক্যাশ পাওয়া গেলে ব্লক রিসেট করুন
                trackAttempts = 0;
                trackBlockUntil = 0;
                try { localStorage.removeItem('trackBlockUntil'); } catch(e){}
                
                return Promise.resolve(cachedData.order);
            }

            // ৪. BLOCK CHECK (তারপর ব্লক)
            // আমরা গ্লোবাল ভেরিয়েবল ব্যবহার করছি যা পেজ লোডে আপডেট হয়েছে
            if (now < trackBlockUntil) {
                const remainingSeconds = Math.ceil((trackBlockUntil - now) / 1000);
                const remainingMins = Math.ceil(remainingSeconds / 60);

                let blockMsg = "";
                if (appData.language === 'bn') {
                    blockMsg = `আপনি অনেক বেশি ভুল চেষ্টা করেছেন। অনুগ্রহ করে ${remainingMins} মিনিট পর আবার চেষ্টা করুন।`;
                } else {
                    blockMsg = `Too many wrong attempts. Please try again after ${remainingMins} minutes.`;
                }
                
                Swal.showValidationMessage(blockMsg);
                return false; 
            }

            // ৫. SERVER CALL
            return new Promise((resolve, reject) => {
                google.script.run
                    .withSuccessHandler(res => {
                        if (res.success) {
                            trackAttempts = 0;
                            trackBlockUntil = 0;
                            try { localStorage.removeItem('trackBlockUntil'); } catch(e){}

                            trackCache[id] = { order: res.order, time: Date.now() };
                            resolve(res.order);
                        } else {
                            const isBlocked = incrementTrackAttempt();
                            if (isBlocked) {
                                resolve(false);
                            } else {
                                Swal.showValidationMessage(res.error || t('order_not_found'));
                                resolve(false);
                            }
                        }
                    })
                    .withFailureHandler(err => {
                        Swal.showValidationMessage(err.message);
                        resolve(false);
                    })
                    .trackOrder(id);
            });
        },
        allowOutsideClick: () => !Swal.isLoading()
    }).then((result) => {
        if (result.isConfirmed && result.value) {
            const order = result.value;
            showOrderTrackingDetails(order);
        }
    });
}

// সাহায্যকারী ফাংশন: অ্যারে এলোমেলো (Shuffle) করার জন্য
function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

// ১. সম্পূর্ণ প্রোডাক্ট লিস্টকে পেজ ভিত্তিক বিন্যাস (Layout) করার মেইন ফাংশন
function generateAllPagesLayout() {
    const allProducts = appData.products || [];
    if (allProducts.length === 0) return;

    // ১ থেকে ৬ নম্বর প্রোডাক্ট ফিচার্ড (আলাদা থাকবে)
    const featuredProds = allProducts.slice(0, 6);
    // ৭ ও ৮ নম্বর প্রোডাক্ট অল প্রোডাক্ট সেকশনের শুরুতে ফিক্সড থাকবে
    const fixedProds = allProducts.slice(6, 8);
    // ৯ নম্বর থেকে বাকি সব প্রোডাক্ট ডাইনামিক পুলে যাবে
    const dynamicPool = allProducts.slice(8);

    // অ্যাক্টিভ ব্যানার ক্যাটাগরিগুলো ফিল্টার করা (শিটের ক্রমানুসারে থাকবে)
    const bannerCats = (appData.categories || []).filter(c => 
        c.inlinebanner && 
        c.inlinebanner.trim() !== '' && 
        (c.inlinebanner.startsWith('http://') || c.inlinebanner.startsWith('https://'))
    );

    // ব্যানারগুলোকে ইউনিক অবজেক্ট হিসেবে অ্যারেতে রাখা (এখানে কোনো shuffle হবে না, শিটের সিরিয়াল ঠিক থাকবে)
    let activeBanners = bannerCats.map(cat => {
        return {
            category: cat.categoryname, 
            bannerUrl: cat.inlinebanner,
            products: []
        };
    });

    // প্রোডাক্টগুলোকে তাদের সঠিক ব্যানারে ভাগ করা
    const normalPool = [];
    dynamicPool.forEach(p => {
        if (!p.category) {
            normalPool.push(p);
            return;
        }

        // প্রথমে একদম হুবহু মিল (Exact Match) বা সাব-ক্যাটাগরি মিল খোঁজা
        let matchedBanner = activeBanners.find(b => 
            p.category === b.category || p.category.startsWith(b.category + ' > ')
        );

        // যদি নিখুঁত মিল না পাওয়া যায়, তবে মেইন ক্যাটাগরি মিল খোঁজা
        if (!matchedBanner) {
            matchedBanner = activeBanners.find(b => 
                p.category.split(' > ')[0] === b.category.split(' > ')[0]
            );
        }

        if (matchedBanner) {
            matchedBanner.products.push(p);
        } else {
            normalPool.push(p);
        }
    });

    // যেসব ব্যানারে কোনো প্রোডাক্ট নেই সেগুলো বাদ দেওয়া
    activeBanners = activeBanners.filter(b => b.products.length > 0);

    // শর্ত মোতাবেক: ব্যানারের ভেতরের প্রোডাক্টগুলো এলোমেলো করা
    activeBanners.forEach(banner => {
        shuffleArray(banner.products);
    });

    // !!! নোট: ব্যানারগুলোর নিজেদের সিরিয়াল এলোমেলো করার লাইনটি (shuffleArray) এখান থেকে সম্পূর্ণ ফেলে দেওয়া হয়েছে !!!

    const pages = {};
    let currentPage = 1;
    pages[currentPage] = { fixedProducts: [], bannerGroups: [], normalProducts: [] };

    // পেজ ১-এর অল প্রোডাক্ট সেকশনের শুরুতে ২টি ফিক্সড প্রোডাক্ট বসানো
    pages[1].fixedProducts = fixedProds;
    let currentCount = 2; 
    
    let bannerIdx = 0;

    // ব্যানারগুলো পেজ অনুযায়ী ডিস্ট্রিবিউট করা
    while (bannerIdx < activeBanners.length) {
        let pageLimit = (currentPage === 1) ? 10 : 30;
        let maxPerBanner = (currentPage === 1) ? 4 : 6;
        let availableSlots = pageLimit - currentCount;

        if (availableSlots <= 0) {
            currentPage++;
            pages[currentPage] = { fixedProducts: [], bannerGroups: [], normalProducts: [] };
            currentCount = 0;
            continue;
        }

        let banner = activeBanners[bannerIdx];
        let takeCount = Math.min(banner.products.length, maxPerBanner);

        if (takeCount <= availableSlots) {
            let bannerProds = banner.products.slice(0, takeCount);
            let excessProds = banner.products.slice(takeCount);

            excessProds.forEach(p => normalPool.push(p));

            pages[currentPage].bannerGroups.push({
                category: banner.category, 
                bannerUrl: banner.bannerUrl,
                products: bannerProds
            });

            currentCount += takeCount;
            bannerIdx++; 
        } else {
            shuffleArray(normalPool);
            while (currentCount < pageLimit && normalPool.length > 0) {
                pages[currentPage].normalProducts.push(normalPool.shift());
                currentCount++;
            }
            currentPage++;
            pages[currentPage] = { fixedProducts: [], bannerGroups: [], normalProducts: [] };
            currentCount = 0;
        }
    }

    // সমস্ত ব্যানার সাজানো শেষ হলে, বাকি থাকা সাধারণ প্রোডাক্টগুলো দিয়ে খালি স্লট পূরণ করা
    shuffleArray(normalPool);
    while (normalPool.length > 0) {
        let pageLimit = (currentPage === 1) ? 10 : 30;
        if (currentCount >= pageLimit) {
            currentPage++;
            pages[currentPage] = { fixedProducts: [], bannerGroups: [], normalProducts: [] };
            currentCount = 0;
        }
        pages[currentPage].normalProducts.push(normalPool.shift());
        currentCount++;
    }

    appData.computedPages = pages;
    appData.totalComputedPages = currentPage;
}

function renderPaginationControls(currentPage, totalProducts) {
    const container = document.getElementById('homePaginationControls');
    if (!container) return;
    const remaining = totalProducts - 10;
    let extraPages = remaining > 0 ? Math.ceil(remaining / 30) : 0;
    const totalPages = 1 + extraPages;
    if (totalPages <= 1) { container.innerHTML = ''; return; }

    let html = '';
    html += `<button onclick="loadAllProductsSection(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''} class="px-3 py-1 border rounded font-medium transition-colors ${currentPage === 1 ? 'text-gray-300 cursor-not-allowed border-gray-200' : 'hover:bg-gray-50 text-gray-700'}"><i class="fas fa-chevron-left"></i></button>`;
    for (let i = 1; i <= totalPages; i++) {
        html += i === currentPage 
            ? `<button class="w-8 h-8 flex items-center justify-center rounded font-bold text-white bg-primary shadow-md">${i}</button>` 
            : `<button onclick="loadAllProductsSection(${i})" class="w-8 h-8 flex items-center justify-center rounded font-medium text-gray-700 border hover:bg-gray-50 transition-colors">${i}</button>`;
    }
    html += `<button onclick="loadAllProductsSection(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''} class="px-3 py-1 border rounded font-medium transition-colors ${currentPage === totalPages ? 'text-gray-300 cursor-not-allowed border-gray-200' : 'hover:bg-gray-50 text-gray-700'}"><i class="fas fa-chevron-right"></i></button>`;
    container.innerHTML = html;
}

        // ================= COUPON & CALCULATION LOGIC (UPDATED FOR MULTI-CATEGORY) =================
        function updateOrderSummary() {
            const selectedItems = appData.cart.filter(item => item.selected !== false);

            if (selectedItems.length === 0) {
                appData.coupon = null;
                appData.pointsDiscount = 0;
                localStorage.setItem('coupon', JSON.stringify(null));
                const toggle = document.getElementById('ptsToggle');
                if(toggle) {
                    toggle.checked = false;
                    toggle.disabled = true;
                }
            }

            let productDiscountAmount = 0;
            let isFreeDeliveryActive = false;
            let isAllCategory = false; // NEW: Flag for All Category
            let applicableCategories = []; // NEW: Array for specific categories
            const baseDelivery = parseFloat(appData.settings.deliverycharge) || 0;

            if (appData.coupon) {
                productDiscountAmount = parseFloat(appData.coupon.discount) || 0;
                if (appData.coupon.isFreeDelivery) {
                    isFreeDeliveryActive = true;
                    // UPDATED: Extract boolean and array from coupon object
                    isAllCategory = appData.coupon.isAllCategory || false;
                    applicableCategories = appData.coupon.applicableCategories || [];
                }
            }

            let subTotal = 0;
            let paidItems = [];
            let allItems = []; 

            selectedItems.forEach(item => {
                const qty = item.quantity || item.qty || 1;
                const price = parseFloat(item.price); // Item price is specific (variant or main)
                const itemCat = (item.category || '').toString().trim().toLowerCase();
                const extraCharge = parseFloat(item.extradeliverycharge || 0);

                subTotal += (price * qty);

                // UPDATED LOGIC: Multi-Category Check
                if (isFreeDeliveryActive) {
                    // If 'all' categories are free, everything goes to freeItems
                    if (isAllCategory) {
                        allItems.push({ qty, extraCharge });
                    } 
                    // If specific categories, check if item category is in the array
                    else if (applicableCategories.includes(itemCat)) {
                        allItems.push({ qty, extraCharge });
                    } 
                    // Else, it's a paid item
                    else {
                        paidItems.push({ qty, extraCharge });
                        allItems.push({ qty, extraCharge });
                    }
                } else {
                    // No coupon or coupon has no free delivery, everything is paid
                    paidItems.push({ qty, extraCharge });
                    allItems.push({ qty, extraCharge });
                }
            });

            const calcShipping = (items) => {
                if (items.length === 0) return 0;
                let totalShipping = 0;
                let isFirstItem = true;
                items.forEach(item => {
                    const qty = item.qty;
                    const extra = item.extraCharge;
                    if (isFirstItem) {
                        totalShipping += baseDelivery;
                        if (qty >1) totalShipping += ((qty - 1) * extra);
                        isFirstItem = false;
                    } else {
                        totalShipping += (qty * extra);
                    }
                });
                return totalShipping;
            };

            const totalShipping = calcShipping(paidItems);
            const totalShippingWithoutCoupon = isFreeDeliveryActive ? calcShipping(allItems) : totalShipping;
            const deliveryDiscountAmount = totalShippingWithoutCoupon - totalShipping;
            
            const finalTotal = (subTotal + totalShipping) - productDiscountAmount - appData.pointsDiscount;

            const updateDisplay = (prefix) => {
                const subEl = document.getElementById(`${prefix}Subtotal`);
                const delEl = document.getElementById(`${prefix}Delivery`);
                const totEl = document.getElementById(`${prefix}Total`);
                
                if(!subEl) return; 

                subEl.innerText = `৳${subTotal.toFixed(2)}`;
                delEl.innerText = totalShipping === 0 ? 'FREE' : `৳${totalShipping.toFixed(2)}`;
                totEl.innerText = `৳${finalTotal.toFixed(2)}`;

                const prodDiscCont = document.getElementById(`${prefix}ProdDiscContainer`);
                const prodDiscText = document.getElementById(`${prefix}ProdDisc`);
                if (productDiscountAmount > 0) {
                    prodDiscCont.classList.remove('hidden');
                    prodDiscText.innerText = `-৳${productDiscountAmount.toFixed(2)}`;
                } else {
                    prodDiscCont.classList.add('hidden');
                }

                const delDiscCont = document.getElementById(`${prefix}DelDiscContainer`);

function calculateCartTotal() {
    const toggle = document.getElementById('ptsToggle');
    const spinner = document.getElementById('ptsLoadingSpinner');
    const savingsLabel = document.getElementById('ptsSavingsLabel');
    
    if (!toggle || !appData.user) return;

    // ==========================================
    // OPTIMIZATION: CLIENT-SIDE POINTS VALIDATION CACHE
    // ==========================================
    
    if (toggle.checked) {
        // ১. বর্তমান কার্টের আইটেমগুলো নিন
        const selectedItems = appData.cart.filter(item => item.selected !== false);
        
        // ২. একটি ইউনিক হ্যাশ (Hash) তৈরি করুন
        const cartString = JSON.stringify(selectedItems);
        const currentHash = simpleHash(appData.user.userid + cartString);

        // ৩. চেক করুন: আগে কি একই কার্ট নিয়ে একই ইউজার চেক করেছিল?
        if (cachedPointsResult && lastPointsCartHash === currentHash) {
            
            // ==========================================
            // নতুন যোগ করা লজিক: যদি আগের রেজাল্ট এরর (Failed) হয়ে থাকে
            // ==========================================
            if (cachedPointsResult.failed) {
                toggle.checked = false; // সুইচ বন্ধ রাখুন
                if(spinner) spinner.classList.add('hidden');
                toggle.disabled = false;
                
                // ক্যাশ থেকে আগের এরর মেসেজটি রিট্রিভ করা হচ্ছে
                const savedError = cachedPointsResult.error || "Something went wrong.";
                
                // চেক করা হচ্ছে এটা কি মিনিমাম অর্ডার এরর নাকি অন্য কোনো এরর (যেমন: এক্সপায়ার্ড)
                if (savedError.includes("Minimum order not met")) {
                    const minAmount = appData.settings.minorderforpoints || 0;
                    const messageBn = `পয়েন্ট ডিসকাউন্ট ব্যবহার করতে হলে আপনাকে নূন্যতম ${minAmount} টাকার অর্ডার করতে হবে...`;
                    const messageEn = `To use points discount, you need to place a minimum order of ${minAmount} Taka...`;
                    Swal.fire({
                        icon: 'info',
                        title: appData.language === 'bn' ? 'তথ্য' : 'Info',
                        text: appData.language === 'bn' ? messageBn : messageEn,
                        confirmButtonText: appData.language === 'bn' ? 'ঠিক আছে' : 'OK',
                        confirmButtonColor: appData.settings.themecolor || '#2563eb'
                    });
                } else {
                    // পয়েন্ট এক্সপায়ার্ড বা অন্য যেকোনো এরর
                    Swal.fire('Info', savedError, 'info');
                }
                return; // সার্ভারে যাওয়ার দরকার নেই, এখানেই থামানো হলো
            }
            // ==========================================
            // ==========================================

            // হ্যাঁ, সফল ক্যাশ আছে!
            appData.pointsDiscount = cachedPointsResult.discount;
            if(savingsLabel) savingsLabel.innerText = `Save ৳${cachedPointsResult.discount.toFixed(2)}`;
            updateOrderSummary(); 
            if(spinner) spinner.classList.add('hidden');
            toggle.disabled = false;
            return; 
        }

        // যদি ক্যাশ না থাকে, তবে নিচের সার্ভার কল শুরু হবে
        toggle.checked = false; 
        spinner.classList.remove('hidden');
        toggle.disabled = true;

        const subtotal = selectedItems.reduce((sum, item) => sum + ((item.price) * (item.quantity || item.qty)), 0);

        google.script.run
            .withSuccessHandler(res => {
                spinner.classList.add('hidden');
                toggle.disabled = false;

                if(res.success) {
                    toggle.checked = true;
                    appData.pointsDiscount = res.discount;
                    if(savingsLabel) savingsLabel.innerText = `Save ৳${res.discount.toFixed(2)}`;
                    
                    // সফল রেজাল্ট ক্যাশে সেভ
                    cachedPointsResult = { discount: res.discount }; 
                    lastPointsCartHash = currentHash;               
                    updateOrderSummary();
                } else {
                    // ==========================================
                    // নতুন যোগ করা লজিক: ব্যর্থ রেজাল্টও ক্যাশে সেভ
                    // যাতে পরের ক্লিকে সার্ভারে কল না যায়
                    // ==========================================
                    cachedPointsResult = { discount: 0, failed: true, error: res.error };
                    lastPointsCartHash = currentHash;
                    // ==========================================

                    // Custom Dynamic Message Logic
                    if (res.error.includes("Minimum order not met")) {
                        const minAmount = appData.settings.minorderforpoints || 0;
                        const messageBn = `পয়েন্ট ডিসকাউন্ট ব্যবহার করতে হলে আপনাকে নূন্যতম ${minAmount} টাকার অর্ডার করতে হবে...`;
                        const messageEn = `To use points discount, you need to place a minimum order of ${minAmount} Taka...`;
                        Swal.fire({
                            icon: 'info',
                            title: appData.language === 'bn' ? 'তথ্য' : 'Info',
                            text: appData.language === 'bn' ? messageBn : messageEn,
                            confirmButtonText: appData.language === 'bn' ? 'ঠিক আছে' : 'OK',
                            confirmButtonColor: appData.settings.themecolor || '#2563eb'
                        });
                    } else {
                        Swal.fire('Info', res.error, 'info');
                    }
                }
            })
            .withFailureHandler(handleAppError)
            .validatePointsForCheckout(appData.user.userid, subtotal);
    } else {
        // যদি টগল বন্ধ করা হয়
        appData.pointsDiscount = 0;
        updateOrderSummary();
    }
}

// গ্লোবাল ভেরিয়েবল (স্ক্রিপ্টের উপরে ঘোষণা করুন)
let cachedCouponResult = null;
let lastCartHash = '';

async function handleApplyCoupon() {
    const couponInput = document.getElementById('couponCode');
    const pageCouponInput = document.getElementById('pageCouponCode');
    const inputField = (document.getElementById('cartPageItems') && !document.getElementById('cartSidebar').classList.contains('hidden')) ? pageCouponInput : couponInput;
    
    if (!inputField) return;
    const rawCode = inputField.value.trim();
    
    if (!rawCode) return Swal.fire('Warning', t('fill_all'), 'warning');

    // ==========================================================
    // NEW: FRONTEND VALIDATION (REGEX)
    // Requirement: Min 3 Letters & 1 Number
    // ==========================================================
    // Regex Explanation:
    // (?=(.*[a-zA-Z]){3,}) -> Lookahead: Ensures at least 3 letters exist
    // (?=.*\d)            -> Lookahead: Ensures at least 1 digit exists
    // [a-zA-Z0-9]+$       -> Allows only alphanumeric characters for the whole string
    const couponRegex = /^(?=(.*[a-zA-Z]){3,})(?=.*\d)[a-zA-Z0-9]+$/;

    if (!couponRegex.test(rawCode)) {
        return Swal.fire({
            icon: 'warning', 
            title: 'Invalid Coupon', 
            text: 'Invalid Coupon Code!' 
        });
    }
    // ==========================================================

    inputField.value = t('validating');

    try {
        const selectedItems = appData.cart.filter(item => item.selected !== false);

        if (selectedItems.length === 0) {
            inputField.value = '';
            return Swal.fire('Warning', 'Please select at least one item to apply coupon', 'warning');
        }

        const response = await new Promise((resolve, reject) => {
            google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).validateCoupon(rawCode, appData.user?.userid, selectedItems);
        });

        if (response.success) {
            // Store the full object
            appData.coupon = { 
                code: response.couponCode, 
                discount: response.discount, 
                isFreeDelivery: response.isFreeDelivery,
                isAllCategory: response.isAllCategory, 
                applicableCategories: response.applicableCategories 
            };
            Swal.fire({ icon: 'success', title: 'Coupon Applied!', text: `You saved ৳${response.discount.toFixed(2)}`, timer: 2000, showConfirmButton: false });
            updateOrderSummary();
            if(couponInput) couponInput.value = '';
            if(pageCouponInput) pageCouponInput.value = '';
        } else {
            appData.coupon = null;
            updateOrderSummary();
            Swal.fire({ icon: 'error', title: 'Invalid Coupon', text: response.message });
        }
    } catch (error) {
        Swal.fire('Error', 'Something went wrong.', 'error');
    } finally {
        if(couponInput && couponInput.value === t('validating')) couponInput.value = '';
        if(pageCouponInput && pageCouponInput.value === t('validating')) pageCouponInput.value = '';
    }
}

// UPDATED: ROBUST LIVE PRICE SYNC FUNCTION
// ==========================================
function syncCartWithLivePrices() {
    // চেক করা হবে প্রোডাক্ট লিস্ট লোড হয়েছে কিনা
    if (!appData.products || appData.products.length === 0) return;

    let isPriceChanged = false;

    appData.cart.forEach((cartItem, index) => {
        // ১. লাইভ প্রোডাক্ট খুঁজে বের করা (ID দিয়ে)
        const liveProduct = appData.products.find(p => p.id == cartItem.id);

        if (liveProduct) {
            let newLivePrice = 0;

            // ২. ভ্যারিয়েন্ট আছে কিনা চেক করা (Case Insensitive ম্যাচিং যোগ করা হয়েছে)
            if (cartItem.selectedVariant && liveProduct.variants && liveProduct.variants.length > 0) {
                // ভ্যারিয়েন্টের নাম trim এবং lowercase করে ম্যাচ করা হচ্ছে
                const variant = liveProduct.variants.find(v => v.name.trim().toLowerCase() === cartItem.selectedVariant.trim().toLowerCase());
                
                if (variant && variant.price) {
                    newLivePrice = parseFloat(variant.price);
                } else {
                    // ভ্যারিয়েন্ট মিললেও দাম না পাওয়া গেলে বা ভুল ভ্যারিয়েন্ট হলে মেইন ডিসকাউন্ট প্রাইস নেবে
                    newLivePrice = parseFloat(liveProduct.discountprice || liveProduct.price);
                }
            } else {
                // ৩. সাধারণ প্রোডাক্ট (ভ্যারিয়েন্ট নেই)
                newLivePrice = parseFloat(liveProduct.discountprice || liveProduct.price);
            }

            // ৪. দাম আপডেট করা (শুধুমাত্র নতুন দাম বৈধ হলে এবং আগের দামের সাথে আলাদা হলে)
            const currentCartPrice = parseFloat(cartItem.price);
            
            // ছোট ভুল এড়ানোর জন্য ২ দশমিক পর্যন্ত তুলনা করা হচ্ছে
            if (newLivePrice > 0 && Math.abs(newLivePrice - currentCartPrice) > 0.01) {
                appData.cart[index].price = newLivePrice;
                isPriceChanged = true;
                
                // ডিবাগিং-এর জন্য কনসোলে লগ করা হচ্ছে (F12 দিয়ে দেখতে পারবেন)
                console.log(`Price Updated for ${cartItem.name}: ${currentCartPrice} -> ${newLivePrice}`);
            }
        }
    });

    // ৫. সেভ করা এবং কুপন রিসেট
    if (isPriceChanged) {
        localStorage.setItem('cart', JSON.stringify(appData.cart));
        
        // দাম বদলালে কুপন রিসেট করা জরুরি
        if (appData.coupon) {
            resetCouponLogic();
        }
    }
}

function getVariantErrorMessage(variants) {
    if (!variants || variants.length === 0) {
        // ডিফল্ট মেসেজ (যদি ভ্যারিয়েন্ট না থাকে)

    }

    // স্পেস রিমুভ করে ছোট হাতে কনভার্ট করা হচ্ছে
    const firstName = variants[0].name.toLowerCase().trim();
    let type = 'color'; 

    // ১. Weight (ওজন) - ইংরেজি ও বাংলা সাপেক্স সাপোর্ট
    if (firstName.match(/(kg|g|ml|l|গ্রাম|কেজি|মিলি|লিটার)$/)) {
        type = 'weight';
    }
    // ২. Size (সাইজ) - ইংরেজি ও বাংলা শব্দ ও সংখ্যা সাপোর্ট
    else if (
        firstName.match(/^(ছোট|মাঝারি|বড়|এস|এম|এল|এক্সএল)$/) || 
        firstName.match(/^[a-z]{1,3}$/) || 
        (firstName.match(/^[0-9]+$/) || firstName.match(/[০-৯]+/))
    ) {
        type = 'size';
    }
    // ৩. Color (রঙ) - বাকি সব কিছু রঙ ধরে নেওয়া হবে

    // ==========================================
    // FIX: EMBEDDED TRANSLATION LOGIC
    // ==========================================
    if (appData.language === 'bn') {
        // বাংলা মেসেজ
        if (type === 'weight') return "দয়া করে আপনার প্রয়োজনীয় ওজন সিলেক্ট করুন।";
        if (type === 'size') return "দয়া করে আপনার সাইজ সিলেক্ট করুন।";
        if (type === 'color') return "দয়া করে আপনার পছন্দের রঙ সিলেক্ট করুন।";
    } else {
        // ইংরেজি মেসেজ
        if (type === 'weight') return "Please select required weight.";
        if (type === 'size') return "Please select your size.";
        if (type === 'color') return "Please select your preferred color.";
    }
    
    // ফলব্যাক (যদি টাইপ মিলবে না)
    return (appData.language === 'bn') ? 'দয়া করে ভ্যারিয়েন্ট সিলেক্ট করুন' : 'Please select a variant';
}

function addToCart(product, qty = 1) {
    // REQUIREMENT CHANGE: Check stock based on totalstock (sum of variants)
    if (product.totalstock <= 0) {
         return Swal.fire('Sorry', t('out_stock'), 'info');
    }

    let selectedVariantData = null;
    let finalPrice = parseFloat(product.discountprice || product.price);

    // Check for variants
    if (product.variants && product.variants.length > 0) {
        const activeBtn = document.querySelector('.variant-btn.active');
        if (!activeBtn) {
            // ==========================================
            // NEW: DYNAMIC MESSAGE LOGIC
            // ==========================================
            const errorMsg = getVariantErrorMessage(product.variants);
            return Swal.fire('Warning', errorMsg, 'warning');
        }
        
        const vName = activeBtn.getAttribute('data-name');
        const vPrice = parseFloat(activeBtn.getAttribute('data-price'));
        const vStock = parseInt(activeBtn.getAttribute('data-stock'));

        if (vStock < qty) {
            return Swal.fire('Sorry', `Insufficient stock for ${vName}. Available: ${vStock}`, 'info');
        }

        selectedVariantData = vName;
        finalPrice = vPrice; // Use variant price
    }

    // Unique ID: ProductID_VariantName (or ProductID if no variant)
    const uniqueId = product.id + '_' + (selectedVariantData || 'Default');
    const existing = appData.cart.find(i => i.uniqueId === uniqueId);
    
    if (existing) {
        if ((existing.quantity || existing.qty) + qty > 3) return Swal.fire(t('limit'), t('max_items'), 'warning');
        if(existing.quantity) existing.quantity += qty;
        else existing.qty += qty;
    } else {
        if (appData.cart.length >=5) return Swal.fire(t('limit'), t('cart_full'), 'warning');
        appData.cart.push({ 
            ...product, 
            quantity: qty, 
            uniqueId: uniqueId,
            selectedVariant: selectedVariantData,
            price: finalPrice // Overwrite price with specific variant price
        });
    }
    
    resetCouponLogic(); 
    
    logEvent('add_to_cart', {
        currency: 'BDT',
        value: finalPrice * qty,
        items: [{ item_id: product.id, item_name: product.name, variant: selectedVariantData, quantity: qty }]
    });
    // === NEW: FACEBOOK PIXEL EVENT ===
    const currentEventId = generateEventId(); // একবারই আইডি তৈরি করুন

    fbq('track', 'AddToCart', {
        content_name: product.name,
        content_category: product.category,
        value: finalPrice * qty,
        currency: 'BDT'
    }, { eventID: currentEventId }); // পিক্সেলে আইডি পাস করুন

    // সার্ভার-সাইড ট্র্যাকিং (CAPI)
    trackCAPI('AddToCart', {
        content_name: product.name,
        content_category: product.category,
        content_ids: [String(product.id)],
        content_type: 'product',
        value: finalPrice * qty,
        currency: 'BDT'
    }, currentEventId); // CAPI তে একই আইডি পাস করুন
    // =========================
    updateCartBadge();
    updateOrderSummary();
    const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 1500 });
    Toast.fire({ icon: 'success', title: t('added_cart') });
}

function updateQty(idx, delta) {
    const item = appData.cart[idx];
    const currentQty = item.quantity || item.qty;
    const newQty = currentQty + delta;
    
    // পরিমাণ ০ এর নিচে যাওয়া যাবে না
    if (newQty < 1) return;

    // সর্বোচ্চ লিমিট চেক (৩টি)
    if (newQty > 3) {
        Swal.fire(t('limit'), t('max_items'), 'warning');
        return; 
    }
    
    // কার্ট অ্যারেতে নতুন পরিমাণ সেট করা
    if(item.quantity) item.quantity = newQty;
    else item.qty = newQty;
    
    // ==========================================
    // FIX: IMMEDIATE UI UPDATES
    // ==========================================
    
    // ১. নেভিগেশন বারের ব্যাজ (Badge) আপডেট করা (এটাই মূল সমাধান)
    updateCartBadge();
    
    // ২. কুপন লজিক রিসেট করা
    resetCouponLogic(); 
    
    // ৩. পেজের ইউআই রিফ্রেশ করা (দাম এবং লিস্ট)
    if(document.getElementById('cartPageItems')) updateCartPageUI();
    if(document.getElementById('cartItems')) updateCartSidebarUI();
    
    // ৪. অর্ডার সামারি আপডেট করা (এখানে লোকাল স্টোরেজে সেভ হয়)
    updateOrderSummary();
    // ==========================================
}

function buyNow(product, qty = 1) {
    // REQUIREMENT CHANGE: Check total stock
    if (product.totalstock <= 0) {
         return Swal.fire('Sorry', t('out_stock'), 'info');
    }

    // সব আগের আইটেমকে Unselect করা (এখন শুধু এই প্রোডাক্টটি কিনবে)
    appData.cart.forEach(item => item.selected = false);

    let selectedVariantData = null;
    let finalPrice = parseFloat(product.discountprice || product.price);

    // ভ্যারিয়েন্ট চেক
    if (product.variants && product.variants.length > 0) {
        const activeBtn = document.querySelector('.variant-btn.active');
        if (!activeBtn) {
            const errorMsg = getVariantErrorMessage(product.variants);
            return Swal.fire('Warning', errorMsg, 'warning');
        }
        const vName = activeBtn.getAttribute('data-name');
        const vPrice = parseFloat(activeBtn.getAttribute('data-price'));
        selectedVariantData = vName;
        finalPrice = vPrice;
    }

    const uniqueId = product.id + '_' + (selectedVariantData || 'Default');
    const existing = appData.cart.find(i => i.uniqueId === uniqueId);
    
    if (existing) {
        if(existing.quantity) existing.quantity = qty;
        else existing.qty = qty;
        existing.selected = true;
        
        // === LOGIC: আপডেট করা আইটেমটিকে তুলে সবার উপরে নিয়ে আসা ===
        const index = appData.cart.indexOf(existing);
        if (index > -1) {
            appData.cart.splice(index, 1); // আগের জায়গা থেকে মুছে ফেলুন
            appData.cart.unshift(existing); // সবার উপরে (Index 0) বসিয়ে দিন
        }
        // ===================================================
    } else {
        // ==========================================
        // গুরুত্বপূর্ণ: এখানে লিমিট চেক রিমুভ করা হয়েছে
        // ==========================================
        
        // === LOGIC: নতুন আইটেম সবার উপরে যোগ করা ===
        appData.cart.unshift({ 
            ...product, 
            quantity: qty, 
            selected: true,
            uniqueId: uniqueId,
            selectedVariant: selectedVariantData,
            price: finalPrice
        });
        // ===================================================
    }

    localStorage.setItem('cart', JSON.stringify(appData.cart));
    updateCartBadge();
    updateOrderSummary();
    
    logEvent('begin_checkout', {
        currency: 'BDT',
        value: finalPrice * qty,
        items: [{ item_id: product.id, item_name: product.name, variant: selectedVariantData, quantity: qty }]
    });

    navigateTo('#cart');
}

function loadHeroSlider() {
    const container = document.getElementById('sliderContainer');
    const dots = document.getElementById('sliderDots');
    if (!container || appData.banners.length === 0) return;
    container.innerHTML = appData.banners.map((b, i) => `
        <div class="hero-slide w-full shrink-0 relative cursor-pointer" onclick="handleBannerClick('${b.linktocategory}', '${b.redirecturl}')">
            <img src="${b.imageurl}" class="w-full h-auto object-cover bg-gray-200 aspect-video rounded-xl" loading="lazy">
        </div>
    `).join('');
    dots.innerHTML = appData.banners.map((_, i) => `
        <button onclick="scrollToSlide(${i})" class="w-2 h-2 rounded-full transition-colors ${i===0?'bg-[var(--primary-color)]':'bg-white/50'}"></button>
    `).join('');
    
    // ==========================================
    // নতুন কোড: সোয়াইপ/স্ক্রল করলে ডট আপডেট করার লজিক
    // ==========================================
    container.addEventListener('scroll', function() {
        // বর্তমানে কোন স্লাইডে আছে তা ক্যালকুলেট করা হচ্ছে
        const scrollPosition = container.scrollLeft;
        const slideWidth = container.clientWidth;
        const activeIndex = Math.round(scrollPosition / slideWidth);
        
        // সব ডট থেকে আগের অ্যাক্টিভ কালার সরিয়ে ফেলা হচ্ছে এবং নতুন অ্যাক্টিভ ডটে কালার দেওয়া হচ্ছে
        const allDots = document.getElementById('sliderDots').querySelectorAll('button');
        allDots.forEach((dot, index) => {
            if (index === activeIndex) {
                dot.className = 'w-2 h-2 rounded-full transition-colors bg-[var(--primary-color)]';
            } else {
                dot.className = 'w-2 h-2 rounded-full transition-colors bg-white/50';
            }
        });
    });
    // ==========================================

    startSlider();
}

        function startSlider() {

                    const idx = Math.round(container.scrollLeft / container.clientWidth);
                    const next = (idx + 1) % appData.banners.length;
                    scrollToSlide(next);

function loadCategoryProducts(name) {
    const content = document.getElementById('content');
    content.innerHTML = ''; 
    
    // ==========================================
    // FIX: SMART SCROLL RESTORATION FOR CATEGORIES
    // ==========================================
    
    // ১. বর্তমান পেজের হ্যাশ (URL)
    const currentHash = window.location.hash;
    
    // ২. সেশন স্টোরেজ থেকে স্ক্রল পজিশন খোঁজা
    let targetScrollY = 0;
    try {
        const savedScroll = sessionStorage.getItem('scrollPos_' + currentHash);
        if (savedScroll) {
            targetScrollY = parseInt(savedScroll, 10);
        }
    } catch (e) {
        // স্টোরেজ না পেলে ডিফল্ট ০ থাকবে
        targetScrollY = 0;
    }

    // ৩. স্ক্রল করা (যদি আগে স্ক্রল করা থাকে তবে সেখানে, না হলে ০-তে)
    requestAnimationFrame(() => {
        window.scrollTo(0, targetScrollY);
    });
    // ==========================================

    // নোট: আমরা এখানে স্কেলেটন লোডার দেখাবো না, কারণ ডাটা ইতিমধ্যেই আমাদের কাছে (appData) আছে।
    
    // চেক করা এটি সাব-ক্যাটাগরি কিনা (Contains ' > ')
    const isSubCategory = name.includes(' > ');

    if (isSubCategory) {
        // LEVEL 3: SUB-CATEGORY (LOCAL FILTERING)
        content.innerHTML = ''; 
        loadTemplate('categoryProductsTemplate');
        
        const parts = name.split(' > ');
        const mainCat = parts[0];
        const subCat = parts[1];

        // টাইটেল আপডেট
        document.getElementById('categoryTitle').textContent = subCat;

        // ==========================================
        // OPTIMIZED LOGIC: LOCAL FILTERING (NO SERVER CALL)
        // ==========================================
        const filteredProducts = appData.products.filter(p => p.category === name);

        // ==========================================
        // BREADCRUMB LOGIC (Sub-Category View)
        // ==========================================
        const bcContainer = document.getElementById('breadcrumb-container');
        if(bcContainer) {
            bcContainer.classList.remove('hidden');
            let bcHtml = '';
            bcHtml += `<button onclick="navigateTo('#categories')" class="hover:text-gray-800">${t('categories')}</button>`;
            bcHtml += `<span class="mx-1 text-gray-400">/</span>`;
            bcHtml += `<button onclick="navigateTo('#category?name=${encodeURIComponent(mainCat)}')" class="hover:text-gray-800">${mainCat}</button>`;
            bcHtml += `<span class="mx-1 text-gray-400">/</span>`;
            bcHtml += `<span class="text-gray-800">${subCat}</span>`;
            bcContainer.innerHTML = bcHtml;
        }

        // প্রোডাক্ট রেন্ডার
        document.getElementById('categoryProducts').innerHTML = filteredProducts.map(p => createProductCard(p)).join('');
        
        if(filteredProducts.length === 0) {
            document.getElementById('categoryProducts').innerHTML = `
                <div class="col-span-2 text-center py-10 text-gray-500">
                    <p>${t('filter_empty')}</p>
                </div>`;
        }

        document.getElementById('content').insertAdjacentHTML('beforeend', getFooterHTML());

    } else {
        // LEVEL 2: CHECK IF SUB-CATEGORIES EXIST
        const hasSubCategories = appData.categories.some(c => c.categoryname.startsWith(name + ' > '));

        if (hasSubCategories) {
            // SHOW SUB-CATEGORIES GRID (LEVEL 2) WITH BREADCRUMB
            content.innerHTML = ''; 
            const subCatContainer = document.createElement('div');
            subCatContainer.className = 'animate-fade-in pb-16';
            
            subCatContainer.innerHTML = `
                <div class="text-base font-semibold text-primary flex items-center space-x-2 mb-4 px-1">

                <div class="flex items-center mb-6">
                    <h1 class="text-2xl font-bold text-gray-800 cursor-pointer" onclick="navigateTo('#categories')">${name}</h1>
                </div>
                <div class="grid grid-cols-3 gap-4" id="subCategoriesList"></div>

            const subCats = appData.categories.filter(c => c.categoryname.startsWith(name + ' > '));

        } else {

            loadTemplate('categoryProductsTemplate');

            // OPTIMIZED LOGIC: LOCAL FILTERING (NO SERVER CALL)
            // ==========================================

            const filteredProducts = appData.products.filter(p => p.category.startsWith(name));

                bcHtml += `<button onclick="navigateTo('#categories')" class="hover:text-gray-800">${t('categories')}</button>`;
                bcHtml += `<span class="mx-1 text-gray-400">/</span>`;

            document.getElementById('categoryProducts').innerHTML = filteredProducts.map(p => createProductCard(p)).join('');

function loadProductDetails(id) {
    const content = document.getElementById('content');
    content.innerHTML = ''; 
    window.scrollTo(0,0);

    // ==========================================
    // OPTIMIZED LOGIC: LOCAL DATA FINDING (NO SERVER CALL)
    // ==========================================
    // সার্ভারে না গিয়ে appData থেকেই প্রোডাক্ট খুঁজে বের করা হচ্ছে
    const p = appData.products.find(product => product.id == id);

    if (!p) {
        // যদি ডাটা না পাওয়া যায় (খুবই বিরল ক্ষেত্রে)
        content.innerHTML = '<div class="p-10 text-center text-red-500">Product not found</div>';
        return;
    }

    // যেহেতু ডাটা লোকালি পাওয়া গেছে, তাই স্কেলেটন দরকার নেই। সাথে সাথে রেন্ডার করা যাচ্ছে।
    const tpl = document.getElementById('productDetailsTemplate');
    content.appendChild(tpl.content.cloneNode(true));
    
    // DOM এলিমেন্টগুলো আপডেট করা (মূল কোডের লজিক এখানে ব্যবহার করা হয়েছে)
    document.getElementById('productName').textContent = p.name;
    document.getElementById('productDescription').innerHTML = p.description || 'No description.';
    
    // Price Calculation
    const mainPrice = parseFloat(p.discountprice || p.price);
    document.getElementById('productPrice').textContent = `৳ ${mainPrice}`;
    document.getElementById('originalPrice').textContent = p.discountprice ? `৳ ${p.price}` : '';
    document.getElementById('discountBadge').textContent = p.discountprice ? `${Math.round(((p.price-p.discountprice)/p.price)*100)}% OFF` : '';
    document.getElementById('originalPrice').style.display = p.discountprice ? 'block' : 'none';
    document.getElementById('discountBadge').style.display = p.discountprice ? 'inline-block' : 'none';
    
    // Stock Status Logic
    const stockEl = document.getElementById('stockStatus');
    const addToCartBtn = document.getElementById('addToCartBtn');
    const stickyBuyNowBtn = document.getElementById('stickyBuyNowBtn');
    const isOutOfStock = p.totalstock <= 0;
    
    if (isOutOfStock) {
        stockEl.className = 'text-sm p-3 rounded-lg flex items-center bg-red-50 text-red-700';
        stockEl.innerHTML = '<i class="fas fa-times-circle mr-2"></i> ' + t('out_stock');
        
        addToCartBtn.disabled = true;
        addToCartBtn.textContent = t('out_stock');
        addToCartBtn.classList.add('bg-gray-400', 'cursor-not-allowed');
        addToCartBtn.classList.remove('bg-primary', 'hover:opacity-90');
        
        stickyBuyNowBtn.disabled = true;
        stickyBuyNowBtn.innerHTML = '<i class="fas fa-times-circle mr-1"></i> ' + t('out_stock');
        stickyBuyNowBtn.classList.add('bg-gray-400', 'cursor-not-allowed');
        stickyBuyNowBtn.classList.remove('bg-primary', 'hover:opacity-90');
    } else if (p.totalstock <= 5) {
        stockEl.className = 'text-sm p-3 rounded-lg flex items-center bg-yellow-50 text-yellow-800';
        stockEl.innerHTML = `<i class="fas fa-exclamation-triangle mr-2"></i> Only ${p.totalstock} left`;
    } else {
        stockEl.className = 'text-sm p-3 rounded-lg flex items-center bg-green-50 text-green-700';
        stockEl.innerHTML = '<i class="fas fa-check-circle mr-2"></i> In Stock';
    }

    // ==========================================
    // VARIANT LOGIC
    // ==========================================
    const variantSection = document.getElementById('variantSection');
    const variantButtons = document.getElementById('variantButtons');
    const variants = p.variants || [];

    if (variants.length > 0) {
        variantSection.classList.remove('hidden');
        variantButtons.innerHTML = variants.map(v => `
            <button class="variant-btn px-4 py-2 rounded-lg text-sm font-medium transition-all ${v.stock <= 0 ? 'opacity-50 cursor-not-allowed' : ''}" 
                data-name="${v.name}" 
                data-price="${v.price}" 
                data-stock="${v.stock}"
                ${v.stock <= 0 ? 'disabled' : ''}
                onclick="selectVariant(this, ${mainPrice})">
                ${v.name}
            </button>
        `).join('');
        
        // Reset selection
        appData.currentSelectedVariant = null; 
        
        const hasOutOfStockVariant = variants.some(v => v.stock <= 0);
        if(hasOutOfStockVariant && p.totalstock > 0) {
             stockEl.innerHTML = '<i class="fas fa-box-open mr-2"></i> Limited Stock';
        }

    } else {
        variantSection.classList.add('hidden');
        document.getElementById('productPrice').textContent = `৳ ${mainPrice}`;
    }
    // ==========================================

    // Gallery logic
    const gallery = document.getElementById('galleryContainer');
    const images = [p.imagemain, p.image2, p.image3, p.image4, p.image5].filter(i => i);
    gallery.innerHTML = images.map((img, i) => `<div class="gallery-slide w-full h-full shrink-0"><img src="${img}" class="w-full h-full object-cover" loading="lazy"></div>`).join('');
    if (p.videourl) {
        gallery.innerHTML += `<div class="gallery-slide w-full h-full shrink-0 flex items-center justify-center bg-black cursor-pointer" onclick="window.open('${p.videourl}','_blank')"><i class="fas fa-play-circle text-white text-5xl opacity-80"></i></div>`;
    }
    document.getElementById('galleryCounter').textContent = `1/${images.length + (p.videourl?1:0)}`;
    gallery.onscroll = () => {
        const idx = Math.round(gallery.scrollLeft / gallery.clientWidth);
        document.getElementById('galleryCounter').textContent = `${idx+1}/${images.length + (p.videourl?1:0)}`;
    };

    let qty = 1;
    const qtyEl = document.getElementById('quantity');
    document.getElementById('decreaseQty').onclick = () => { if(qty>1) { qty--; qtyEl.textContent=qty; }};
    document.getElementById('increaseQty').onclick = () => { 
        let maxStock = p.totalstock;
        if(appData.currentSelectedVariant) {
            const v = variants.find(v => v.name === appData.currentSelectedVariant);
            if(v) maxStock = v.stock;
        }

        if(qty<maxStock && qty<3) { 
            qty++; qtyEl.textContent=qty; 
        } else if (qty>=3) { 
            Swal.fire(t('limit'), t('max_items'), 'warning'); 
        } else {
            Swal.fire('Info', 'Max stock reached', 'info');
        }
    };
    
    addToCartBtn.onclick = () => addToCart(p, qty);
    stickyBuyNowBtn.onclick = () => buyNow(p, qty);
    // === NEW: FACEBOOK PIXEL EVENT (ViewContent) ===
    const viewEventId = generateEventId(); // একবারই আইডি তৈরি করুন

    fbq('track', 'ViewContent', {
        content_name: p.name,           
        content_category: p.category,    
        value: parseFloat(p.discountprice || p.price), 
        currency: 'BDT'
    }, { eventID: viewEventId }); // পিক্সেলে আইডি পাস করুন

    // সার্ভার-সাইড ট্র্যাকিং (CAPI)
    if(p) {
        trackCAPI('ViewContent', {
            content_name: p.name,
            content_category: p.category,
            content_ids: [String(p.id)],
            content_type: 'product',
            value: parseFloat(p.discountprice || p.price),
            currency: 'BDT'
        }, viewEventId); // CAPI তে একই আইডি পাস করুন
    }
    // ===========================
    loadRelatedProducts(p.category, p.id);
    renderReviews(p.id);
    setupStarInteraction();
    document.getElementById('content').insertAdjacentHTML('beforeend', getFooterHTML());
}

        // ==========================================
        // NEW: VARIANT SELECTION FUNCTION
        // ==========================================
        function selectVariant(btn, fallbackPrice) {
            // UI Update
            document.querySelectorAll('.variant-btn').forEach(b => {
                b.classList.remove('active', 'bg-primary', 'text-white', 'border-primary');
                if(!b.disabled) {
                    b.classList.add('bg-white', 'text-gray-700', 'border-gray-200');
                }
            });
            btn.classList.remove('bg-white', 'text-gray-700', 'border-gray-200');
            btn.classList.add('active', 'bg-primary', 'text-white', 'border-primary');

            // Data Update
            const name = btn.getAttribute('data-name');
            const price = parseFloat(btn.getAttribute('data-price'));
            
            appData.currentSelectedVariant = name;

            // Price Update (If price is defined, use it, else use fallback/main price)
            if (!isNaN(price)) {
                document.getElementById('productPrice').textContent = `৳ ${price}`;
            } else {
                document.getElementById('productPrice').textContent = `৳ ${fallbackPrice}`;
            }
        }
        // ==========================================

        function loadRelatedProducts(cat, id) {
            const container = document.getElementById('relatedProducts');
            const related = appData.products.filter(p => p.category === cat && p.id != id).slice(0, 4);
            container.innerHTML = related.map(p => createProductCard(p)).join('');
        }

function loadCheckoutPage() {
    // ==========================================
    // FIX: CHECKOUT SCROLL RESTORATION
    // ==========================================

    try {
        const savedScroll = sessionStorage.getItem('scrollPos_' + currentHash);
        if (savedScroll) {
            targetScrollY = parseInt(savedScroll, 10);
        }
    } catch (e) {
        targetScrollY = 0;
    }

    requestAnimationFrame(() => {
        window.scrollTo(0, targetScrollY);
    });
    // ==========================================

    loadTemplate('checkoutTemplate');
            if (!appData.user) {
                document.getElementById('loginRequired').classList.remove('hidden');
                document.getElementById('billingForm').classList.add('hidden');
                return;
            }
            
            const toggle = document.getElementById('ptsToggle');
            const spinner = document.getElementById('ptsLoadingSpinner');
            const savingsLabel = document.getElementById('ptsSavingsLabel');
            
            appData.pointsDiscount = 0;
            if(toggle) {
                toggle.checked = false;
                spinner.classList.add('hidden');
            }
            
            if(appData.user && appData.user.currentpoints > 0) {
                silentPointsRefresh();
                if(toggle) toggle.disabled = false;
                const ptsVal = (Number(appData.user.currentpoints) || 0) * (Number(appData.settings.pointvalue) || 1);
                const maxD = Number(appData.settings.maxpointdiscountlimit);
                const savings = Math.min(ptsVal, maxD);
                if(savingsLabel) savingsLabel.innerText = `Save up to ৳${savings}`;
            } else {

                if(savingsLabel) savingsLabel.innerText = `No Points`;
            }

            logEvent('begin_checkout', {
                currency: 'BDT',
                value: selectedItems.reduce((s, i) => s + ((i.price)*(i.quantity||i.qty)), 0),
                items: selectedItems.map(i => ({ item_id: i.id, item_name: i.name, variant: i.selectedVariant }))
            });

            // ==========================================
            // নতুন কোড: CART CHECKOUT CAPI TRACKING
            // ==========================================
            const cartCheckoutTotal = selectedItems.reduce((s, i) => s + ((i.price)*(i.quantity||i.qty)), 0);
            const cartCheckoutEventId = generateEventId(); 
            
            fbq('track', 'InitiateCheckout', {
                content_ids: selectedItems.map(i => String(i.id)),
                content_type: 'product',
                value: cartCheckoutTotal,
                currency: 'BDT',
                num_items: selectedItems.length
            }, { eventID: cartCheckoutEventId }); 

            trackCAPI('InitiateCheckout', {
                content_ids: selectedItems.map(i => String(i.id)),
                content_type: 'product',
                value: cartCheckoutTotal,
                currency: 'BDT',
                num_items: selectedItems.length
            }, cartCheckoutEventId); 
            // ==========================================

            document.getElementById('checkoutName').value = appData.user.fullname;
            document.getElementById('checkoutPhone').value = appData.user.mobilenumber;
            
            // ==========================================
            // ১. লোকাল স্টোরেজ থেকে আগের সেভ করা ডাটা আনা হচ্ছে
            // ==========================================
            const savedDistrict = localStorage.getItem('cached_district') || appData.user.defaultdistrict || '';
            const savedUpazila = localStorage.getItem('cached_upazila') || appData.user.defaultupazila || '';
            const savedAddress = localStorage.getItem('cached_address') || appData.user.fulladdress || '';

            const distSelect = document.getElementById('checkoutDistrict');
            const upaSelect = document.getElementById('checkoutUpazila');
            const addressInput = document.getElementById('checkoutAddress');
            
            distSelect.innerHTML = '<option value="">' + t('Select District') + '</option>' + Object.keys(appData.locations).map(d => `<option value="${d}">${d}</option>`).join('');
            
            // সেভ করা জেলা থাকলে সেট করা
            if (savedDistrict) {
                distSelect.value = savedDistrict;
                // জেলা সিলেক্ট করার সাথে সাথে উপজেলার লিস্ট তৈরি করা হচ্ছে
                populateUpazilas(savedDistrict);
                // উপজেলা লোড হতে ক্ষুদ্র সময় লাগে তাই setTimeout ব্যবহার করা হয়েছে
                setTimeout(() => {
                    upaSelect.value = savedUpazila;
                }, 150);
            } else {
                populateUpazilas('');
            }

            // সেভ করা ঠিকানা ইনপুট বক্সে বসানো হচ্ছে
            addressInput.value = savedAddress;

            // ==========================================
            // ২. নতুন কোড: টাইপ করার সাথে সাথে ব্রাউজারে সেভ হওয়া
            // ==========================================
            distSelect.addEventListener('change', function() {
                localStorage.setItem('cached_district', this.value);
                // জেলা পরিবর্তন হলে উপজেলা রিসেট হয়ে যাবে (কারণ নতুন জেলার অন্য উপজেলা হতে পারে)
                localStorage.removeItem('cached_upazila');
                populateUpazilas(this.value); // ← এই লাইনটি মিসিং ছিল
            });

            upaSelect.addEventListener('change', function() {
                localStorage.setItem('cached_upazila', this.value);
            });

            addressInput.addEventListener('input', function() {
                localStorage.setItem('cached_address', this.value);
            });
            // ==========================================

            updateCheckoutSummary();

function placeOrder() {
    const name = document.getElementById('checkoutName').value.trim();
    const phone = document.getElementById('checkoutPhone').value.trim();
    const district = document.getElementById('checkoutDistrict').value;
    const upazila = document.getElementById('checkoutUpazila').value;
    const address = document.getElementById('checkoutAddress').value.trim();
    
    if (!phone.match(/^01\d{9}$/)) return Swal.fire('Error', t('invalid_phone'), 'error');

    const selectedItems = appData.cart.filter(item => item.selected !== false);
    
    if (selectedItems.length === 0) return Swal.fire('Error', 'Please select at least one item', 'error');
    if (!name || !phone || !district || !upazila || !address) return Swal.fire('Missing', t('fill_all'), 'error');
    
    // ইউজার লগড ইন আছে কিনা চেক
    if (!appData.user) {
        return handleSessionError();
    }

    const usePoints = document.getElementById('ptsToggle').checked;

    // === ফেসবুক পিক্সেলের জন্য মোট অর্ডার ভ্যালু ক্যালকুলেশন ===
    const totalOrderValue = selectedItems.reduce((sum, item) => sum + ((item.price) * (item.quantity || item.qty)), 0);

    const orderData = {
        userId: appData.user.userid, 
        fullname: name, 
        phone, 
        district, 
        upazila, 
        address,
        cartItems: selectedItems, 
        couponCode: appData.coupon?.code || '',
        usePoints: usePoints,
        sessionToken: appData.sessionToken,
        userEmail: appData.user.email
    };

    Swal.fire({ title: t('processing'), didOpen: () => Swal.showLoading() });
    
    google.script.run.withSuccessHandler(res => {
        Swal.close(); // লোডিং বন্ধ করা
        
        // === SESSION INVALID CHECK ===
        if (!res.success) {
            const errorMsg = (res.error || '').toLowerCase();
            // যদি এরর মেসেজে এই শব্দগুলো থাকে তবে সেশন এরর ধরে নেবে
            if (errorMsg.includes('session') || errorMsg.includes('token') || errorMsg.includes('invalid') || errorMsg.includes('expired')) {
                handleSessionError(); 
                return; 
            }
            // অন্যান্য এরর থাকলে সাধারণ এরর দেখাবে
            else {
                Swal.fire('Failed', res.error, 'error'); 
            }
        }
        // ===========================================

        if (res.success) {
            // === FACEBOOK PIXEL EVENT (Purchase + CAPI Sync) ===
            const purchaseData = {
                value: totalOrderValue, 
                currency: 'BDT',
                content_ids: selectedItems.map(item => String(item.id)),
                content_type: 'product',
                content_name: selectedItems[0]?.name || ''
            };
            
            // ১. ব্রাউজার পিক্সেলে পাঠানো (eventID দিয়ে)
            fbq('track', 'Purchase', purchaseData, { eventID: res.orderId }); 
            
            // ২. সার্ভারে পাঠানো (IP, UserAgent, Cookies সহ)
            trackCAPI('Purchase', purchaseData, res.orderId); 
            // ============================================

            // কার্ট এবং অন্যান্য স্টেট ক্লিয়ার করা
            appData.cart = appData.cart.filter(item => item.selected === false);
            allOrdersCache = []; 
            appData.coupon = null;
            appData.pointsDiscount = 0;
            appData.user.currentpoints -= res.pointsUsed;
            
            localStorage.setItem('user', JSON.stringify(appData.user));
            localStorage.setItem('cart', JSON.stringify(appData.cart));
            localStorage.removeItem('coupon');
            
            // === SUCCESS MESSAGE ALERT (এখানেই মেসেজটি আসবে) ===
            Swal.fire({
                icon: 'success',
                title: 'Success',
                text: `${t('order_placed')} ID: ${res.orderId}`,
                confirmButtonText: 'OK',
                confirmButtonColor: appData.settings.themecolor || '#2563eb'
            }).then(() => {
                updateCartBadge();
                navigateTo('#home');
            });
            // =================================================
        } 
// ✅ নতুন যা বসাবেন (এই ১১ লাইন বসান)
    }).withFailureHandler(err => {
        // === SESSION INVALID CHECK (FAILURE HANDLER) ===
        const errStr = String(err).toLowerCase();
        if (errStr.includes('session') || errStr.includes('token') || errStr.includes('unauthorized') || errStr.includes('expired') || errStr.includes('access')) {
            handleSessionError();
        } else {
            Swal.fire('Error', err.message, 'error');
        }
        // ================================================
    }).placeOrder(orderData);
}
